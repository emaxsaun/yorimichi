  $("#backPay2").addEventListener("click",()=>{Sound.tick();choosePayment();});
  $("#payNow").addEventListener("click",()=>{
    if(tendered<total)return;
    Sound.coin();
    finishPay("Cash", total, tendered-total);
  });
}

function qrSVG(){
  const f=(x,y)=>`<rect x="${x}" y="${y}" width="16" height="16" fill="#13182b"/><rect x="${x+3}" y="${y+3}" width="10" height="10" fill="#fff"/><rect x="${x+5}" y="${y+5}" width="6" height="6" fill="#13182b"/>`;
  let mod="";
  for(let y=0;y<11;y++)for(let x=0;x<11;x++){
    if((x<4&&y<4)||(x>6&&y<4)||(x<4&&y>6)) continue;       // skip finder zones
    if((x*5+y*3+x*y)%2===0) mod+=`<rect x="${x*5+1.5}" y="${y*5+1.5}" width="4.6" height="4.6" fill="#13182b"/>`;
  }
  return `<svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg"><rect width="60" height="60" rx="5" fill="#fff"/>${f(2,2)}${f(42,2)}${f(2,42)}${mod}</svg>`;
}
function payTouch(kind){
  const total=grandTotal();
  if(session.balance < total){ showInsufficient(total); return; }
  const label = kind==="qr"?"QR pay (コード決済)":"Credit / iD (タッチ)";
  const device = kind==="qr"
    ? `<div class="paydevice phone" id="payDevice"><div class="qr">${qrSVG()}</div><span>SHOW CODE</span></div>`
    : `<div class="paydevice card" id="payDevice"><b>CREDIT / iD</b><span class="chip"></span><div class="num">•••• 4649</div></div>`;
  $("#regStep").innerHTML=`
    <div class="tapstage">
      <div class="reader active" id="reader" style="background:radial-gradient(circle at 50% 40%,#2b3550,#14182b)">
        <span class="ripple"></span><span class="ripple"></span><span class="ripple"></span>
        <div class="touchpad"><div class="pico">${kind==="qr"?pxIcon("qr",28):pxIcon("card",28)}</div>${kind==="qr"?"SHOW QR":"TOUCH"}<br>${yen(total)}</div>
      </div>
      ${device}
      <p class="tap-hint">${kind==="qr"?"Tap your phone's code on the scanner to pay.":"Tap your card on the reader to pay."}</p>
      <div class="askrow" style="margin-top:10px">
        <button class="cta small" id="doTouch">${kind==="qr"?"Scan code":"Pay"} →</button>
        <button class="cta ghost small" id="backPay3">‹ Other payment</button>
      </div>
    </div>`;
  let done=false;
  const go=()=>{
    if(done)return; done=true;
    Sound.piLong();
    const r=$("#reader"); if(r){ r.classList.remove("active"); r.querySelector(".touchpad").innerHTML=`<div class="pico">${pxIcon("check",28)}</div>ありがとう<br>${yen(total)}`; }
    const dev=$("#payDevice"); if(dev) dev.style.opacity="0.5";
    setTimeout(()=>finishPay(label,total,0),800);
  };
  $("#reader").addEventListener("click",go);
  $("#payDevice").addEventListener("click",go);
  $("#doTouch").addEventListener("click",go);
  $("#backPay3").addEventListener("click",()=>{Sound.tick();choosePayment();});
}

/* =========================================================== RECEIPT */
function finishPay(method, total, change){
  // commit to journal & stats
  const items=Object.entries(session.cart).filter(([,q])=>q>0);
  items.forEach(([id,q])=>{ G.journal[id]=(G.journal[id]||0)+q; });
  G.visits++; G.totalSpent+=total;
  const points = Math.floor(total/100);
  if(session.pointcard) G.points += points;
  if(!session.bagged) G.noBag += 1;
  // single balance — every method draws from it
  session.balance -= total;
  if(session.balance<0) session.balance=0;
  G.balance = session.balance;
  G.lowestBalAfterPay = G.lowestBalAfterPay==null ? session.balance : Math.min(G.lowestBalAfterPay, session.balance);
  session.paid = true;
  checkAchievements(total);
  save();
  showReceipt(method,total,change,points);
}

/* =========================================================== ENJOY */
function enjoySpotSVG(time){
  // pixel riverbank scene, 40x16 grid -> 600x240 (each cell 15px). Time-of-day palette.
  const night = time==="late";
  const P = {
    morning:{sky:"#FBE6C9",orb:"#FFD98A",water:"#a9cdd4",wave:"#c8e0e4",city:"#c9b79a",bank:"#b7a884",star:null},
    day:    {sky:"#CDEAF1",orb:"#FFE9A8",water:"#9cc6cf",wave:"#bfe0e6",city:"#b6c6cc",bank:"#b7b6aa",star:null},
    evening:{sky:"#E8A06A",orb:"#FFCE7A",water:"#7c93a6",wave:"#9fb1bf",city:"#7a5f6a",bank:"#6f5a52",star:null},
    late:   {sky:"#10162C",orb:"#F6F0D8",water:"#15233a",wave:"#24405e",city:"#22304d",bank:"#26324a",star:"#FFE9A8"},
  }[time]||{sky:"#CDEAF1",orb:"#FFE9A8",water:"#9cc6cf",wave:"#bfe0e6",city:"#b6c6cc",bank:"#b7b6aa",star:null};
  const CELL=15, COLS=40, ROWS=16;
  let r="";
  const rect=(x,y,w,h,c)=>{ r+=`<rect x="${x*CELL}" y="${y*CELL}" width="${w*CELL}" height="${h*CELL}" fill="${c}"/>`; };
  // sky
  rect(0,0,COLS,10,P.sky);
  // sun/moon (blocky disc)
  const ox = night?32:5, oy=1;
  rect(ox+1,oy,3,1,P.orb); rect(ox,oy+1,5,3,P.orb); rect(ox+1,oy+4,3,1,P.orb);
  if(night){ rect(ox,oy+1,2,3,P.sky); } // crescent bite
  // stars at night
  if(P.star){ for(let i=0;i<18;i++){ const sx=(i*7+3)%COLS, sy=(i*5)%7; rect(sx,sy,1,1,P.star); } }
  // far city skyline (blocky buildings)
  for(let i=0;i<COLS;i+=3){ const bh=2+((i*7)%4); rect(i,10-bh,2,bh,P.city);
    if(night){ rect(i,10-bh+1,1,1,"#FFE9A8"); } }
  // bank strip
  rect(0,10,COLS,1,P.bank);
  // water
  rect(0,11,COLS,5,P.water);
  // wave lines
  for(let i=0;i<COLS;i+=2){ rect(i,12,1,1,P.wave); }
  for(let i=1;i<COLS;i+=2){ rect(i,14,1,1,P.wave); }
  // bench (wood) centered on the bank
  rect(16,9,8,1,"#7a5c3a"); rect(16,10,1,1,"#5e4628"); rect(23,10,1,1,"#5e4628");
  return `<svg viewBox="0 0 ${COLS*CELL} ${ROWS*CELL}" xmlns="http://www.w3.org/2000/svg" class="enjoyscene" style="image-rendering:pixelated" preserveAspectRatio="xMidYMid slice">${r}</svg>`;
}
let enjoyIndex=0, enjoyItems=[];
function startEnjoy(){
  inStoreView = false;
    Sound.eat();
  bgmAllowed = true; bgmKind = "store"; Sound.startAmbient("store");
  // unique items, in a nice order: hot first, then sweets/drinks last
  enjoyItems = Object.keys(session.cart).filter(id=>session.cart[id]>0).map(itemById);
  enjoyItems.sort((a,b)=> (b.hot?1:0)-(a.hot?1:0));
  enjoyIndex=0;
  showEnjoy();
}
function showEnjoy(){
  const it=enjoyItems[enjoyIndex];
  const where = session.time==="late"?"on a quiet bench by the river, the city humming behind you"
    : session.time==="evening"?"on the riverbank as the sky goes orange"
    : session.time==="morning"?"on a bench in the early light"
    : "by the water, in no hurry at all";
  const carry = session.bagged ? "the ヨリミチ bag rustling beside you" : "everything balanced in your hands and pockets";
  render(`
  <div class="enjoy">
    ${enjoySpotSVG(session.time)}
    <div class="enjoycard${enjoyItems.length>1?' multi-item':''}">
      <div class="bigart">${it.art()}</div>
      <h2 class="jp">${it.jp}</h2>
      <div class="ro">${it.ro} · ${it.en}</div>
      <p class="flavor">You sit ${where}, ${carry}, and open the ${it.ro}.</p>
      ${session.bagged ? (()=>{
        const remaining = enjoyItems.length - enjoyIndex - 1;
        if(enjoyItems.length === 1) return "";                     // only item — bag note makes no sense
        if(remaining === 0) return `<div class="bagnote"><div class="bagicon">${Art.bag()}</div><span>the ヨリミチ bag is empty</span></div>`;
        const word = remaining === 1 ? "one more thing waits" : `${remaining} more things wait`;
        return `<div class="bagnote"><div class="bagicon">${Art.bag()}</div><span>${word} in the ヨリミチ bag</span></div>`;
      })() : ""}
      <p class="flavor" style="font-style:normal;margin-top:8px">${it.flavor}</p>
      <div class="enjoynav">
        ${enjoyItems.length>1 && enjoyIndex>0?`<button class="cta ghost small" id="prev">‹</button>`:""}
        ${enjoyItems.length>1?(enjoyItems.length<=8
          ?`<div class="dotnav" aria-label="Item ${enjoyIndex+1} of ${enjoyItems.length}">${enjoyItems.map((_,i)=>`<i class="${i===enjoyIndex?'on':''}"></i>`).join("")}</div>`
          :`<div class="enjoycount" aria-label="Item ${enjoyIndex+1} of ${enjoyItems.length}">${enjoyIndex+1} / ${enjoyItems.length}</div>`):""}
        ${enjoyIndex<enjoyItems.length-1
          ?`<button class="cta small" id="next">Next ›</button>`
          :`<button class="cta small" id="done">満足 — Done</button>`}
      </div>
    </div>
  </div>`);
  if($("#prev")) $("#prev").addEventListener("click",()=>{if(enjoyIndex>0){enjoyIndex--;Sound.tick();showEnjoy();}});
  if($("#next")) $("#next").addEventListener("click",()=>{enjoyIndex++;Sound.eat();showEnjoy();});
  if($("#done")) $("#done").addEventListener("click",()=>{Sound.tick();showPassport(true);});
}

/* =========================================================== PASSPORT */
function obtainHint(it){
  if(it.ltd) return pxIcon("sparkle",12)+" Limited — keep visiting";
  if(it.times){ const t=it.times; return (t.includes("evening")||t.includes("late")) ? pxIcon("moon",12)+" Evening / late only" : pxIcon("clock",12)+" "+t.join("/"); }
  if(it.seasons){ const map={spring:pxIcon("sakura",12)+" Spring",summer:pxIcon("beach",12)+" Summer",autumn:pxIcon("maple",12)+" Autumn",winter:pxIcon("snow",12)+" Winter"};
    return it.seasons.map(s=>map[s]||s).join(" / "); }
  const sec=SECTIONS.find(s=>s.id===it.sec);
  return "in "+(sec?sec.en:it.sec);
}
function setPassDisabled(off){
  $$(".js-pass").forEach(b=>{ b.classList.toggle("is-off", !!off); b.disabled=!!off; });
}
function closePassportOverlay(){
  const ov=$("#passportOverlay"); if(ov){ ov.classList.remove("on"); ov.setAttribute("aria-hidden","true"); ov.innerHTML=""; }
  setPassDisabled(false);
}
function passportHTML(justFinished){
  const tried=Object.keys(G.journal).length;
  const totalItems=CATALOG.length + LIMITEDS.length;
  const allIds = CATALOG.concat(LIMITEDS);
  const backLabel = justFinished ? "‹ Back" : "‹ Close";
  const ctaLabel  = justFinished ? "Visit again →" : "Close";
  return `
  <div class="passport wrap">
    <button class="backbtn" id="back">${backLabel}</button>
    <div style="text-align:center;margin:4px 0 18px">
      <div class="brandmark" style="display:inline-block">KONBINI PASSPORT</div>
      <h1 class="jp" style="font-size:26px;margin-top:10px">${justFinished?"ごちそうさま。":"Your konbini passport"}</h1>
      ${justFinished?`<p class="fineprint" style="margin:6px auto 0">A good visit. The post-trip ache is a little lighter.</p>`:""}
    </div>
    <div class="statgrid">
      <div class="stat"><b>${G.visits}</b><span>visits</span></div>
      <div class="stat"><b>${tried}/${totalItems}</b><span>items tried</span></div>
      <div class="stat"><b>${yen(G.totalSpent)}</b><span>spent over time</span></div>
      <div class="stat"><b>${G.icPays}</b><span>IC taps</span></div>
      <div class="stat"><b>${G.points}<small style="font-size:14px"> pt</small></b><span>points earned ${pxIcon("star",12)}</span></div>
      <div class="stat"><b>${G.noBag}</b><span>times you brought your own ${pxIcon("leaf",12)}</span></div>
    </div>

    <div class="subhead"><span class="ln"></span><h2 class="jp">Things you've tried</h2><span class="ln"></span></div>
    <p class="fineprint" style="margin:-2px auto 14px;text-align:center">Locked items show where or when to find them. Set the time &amp; season on the title screen to unlock seasonal and late-night treats.</p>
    <div class="passgrid">
      ${allIds.map(it=>{const c=G.journal[it.id]||0;return `
        <div class="stamp ${c?'':'locked'}">
          ${c?`<span class="cnt">${c}</span>`:""}
          ${it.art()}
          <div class="sname">${c?it.ro:obtainHint(it)}</div>
        </div>`;}).join("")}
    </div>

    <div class="subhead" style="margin-top:22px"><span class="ln"></span><h2 class="jp">Stamps</h2><span class="ln"></span></div>
    <div class="achwrap">
      ${ACHIEVEMENTS.map(a=>`<div class="ach ${G.achievements[a.id]?'':'locked'}">${G.achievements[a.id]?pxIcon(a.ic,16):pxIcon("lock",16)} ${a.name}</div>`).join("")}
    </div>

    <div style="text-align:center;margin-top:26px" class="cta-row">
      <button class="cta" id="again">${ctaLabel}</button>
    </div>
    <div style="text-align:center;margin-top:28px">
      <button class="linkbtn" id="toTitle">⟲ Back to title screen</button>
    </div>
    <div style="text-align:center;margin-top:10px">
      <button class="linkbtn" id="resetProg">Reset everything (start fresh)</button>
    </div>
  </div>`;
}
function showPassport(justFinished){
  setTod();
  if(bgmAllowed) Sound.startAmbient(bgmKind);
  const html = passportHTML(justFinished);
  let root;
  if(justFinished){
    inStoreView=false;
    render(html);
    root=document;
  } else {
    const ov=$("#passportOverlay"); ov.innerHTML=html; ov.classList.add("on"); ov.setAttribute("aria-hidden","false"); ov.scrollTop=0;
    root=ov;
  }
  setPassDisabled(true);
  const q = sel => root.querySelector(sel);
  const leave = ()=>{
    Sound.tick();
    if(justFinished){ newSession(); setPassDisabled(false); enterExterior(); }
    else { closePassportOverlay(); }
  };
  q("#back").addEventListener("click",leave);
  q("#again").addEventListener("click",leave);
  q("#toTitle").addEventListener("click",()=>{ Sound.tick(); location.reload(); });
  let resetArmed=false;
  q("#resetProg").addEventListener("click",()=>{
    const btn=q("#resetProg");
    if(!resetArmed){ resetArmed=true; btn.textContent="Tap again to erase all progress"; btn.classList.add("danger");
      Sound.error(); setTimeout(()=>{ const b2=q("#resetProg"); if(b2){resetArmed=false;b2.textContent="Reset everything (start fresh)";b2.classList.remove("danger");} },4000); return; }
    resetProgress(); Sound.stamp(); toast("Fresh start — empty passport, ¥5,000 balance.");
    closePassportOverlay(); enterExterior();
  });
}

/* =========================================================== ACHIEVEMENTS */
const ACHIEVEMENTS=[
  {id:"first", ic:"party", name:"ただいま — First visit"},
  {id:"late", ic:"moon", name:"3AM run"},
  {id:"onigiri_all", ic:"onigiri", name:"All onigiri tried"},
  {id:"big", ic:"cash", name:"Big haul (¥2000+)"},
  {id:"warm", ic:"onsen", name:"Had it heated"},
  {id:"ic5", ic:"penguin", name:"5 IC taps"},
  {id:"lowbal", ic:"star", name:"Cut it close (<¥200 left)"},
  {id:"season", ic:"sakura", name:"Tried a seasonal item"},
  {id:"mybag", ic:"leaf", name:"My-bag spirit (×5 no bag)"},
  {id:"collector", ic:"box", name:"20 items tried"},
  {id:"gourmet", ic:"crown", name:"Tried everything"},
];
function unlock(id){ if(!G.achievements[id]){ G.achievements[id]=true; const a=ACHIEVEMENTS.find(x=>x.id===id);
  if(a){ setTimeout(()=>{toast(`Stamp earned — ${a.name}`, pxIcon(a.ic,14)); Sound.stamp();}, 600);} } }
function checkAchievements(total){
  unlock("first");
  if(session.time==="late") unlock("late");
  if(total>=2000) unlock("big");
  if(session.warmed) unlock("warm");
  if(G.icPays>=5) unlock("ic5");
  if(G.lowestBalAfterPay!=null && G.lowestBalAfterPay<200) unlock("lowbal");
  const onigiri=CATALOG.filter(i=>i.sec==="onigiri");
  if(onigiri.every(i=>G.journal[i.id])) unlock("onigiri_all");
  if(Object.keys(session.cart).some(id=>{const it=itemById(id);return it&&it.season;})) unlock("season");
  if(G.noBag>=5) unlock("mybag");
  if(Object.keys(G.journal).length>=20) unlock("collector");
  if(CATALOG.concat(LIMITEDS).every(i=>G.journal[i.id])) unlock("gourmet");
}

/* =========================================================== GLOBAL CONTROLS */
/* delegated so the same controls work whether they live in the float overlay
   (most screens) or inside the store top bar */
document.addEventListener("click", e=>{
  const s=e.target.closest(".js-sound");
  if(s){
    const on=!Sound.isEnabled(); Sound.setEnabled(on); Sound.resume();
    $$(".js-sound").forEach(b=>b.innerHTML=pxIcon(on?"soundOn":"soundOff",18));
    if(on){Sound.tick(); if(bgmAllowed) Sound.startAmbient(bgmKind);}
    return;
  }
  const p=e.target.closest(".js-pass");
  if(p){ if(p.classList.contains("is-off")) return; Sound.resume();Sound.tick();showPassport(); }
});

/* Browsers block audio until the first user gesture — kick BGM in on the first tap/click/key anywhere, then remove the listener. */
function firstGestureBGM(){
  Sound.resume();
  if(bgmAllowed) Sound.startAmbient(bgmKind);
  window.removeEventListener("pointerdown", firstGestureBGM, true);
  window.removeEventListener("touchstart", firstGestureBGM, true);
  window.removeEventListener("keydown", firstGestureBGM, true);
}
window.addEventListener("pointerdown", firstGestureBGM, true);
window.addEventListener("touchstart", firstGestureBGM, true);
window.addEventListener("keydown", firstGestureBGM, true);

/* iOS kills audio when the screen locks / app backgrounds — revive it on return */
document.addEventListener("visibilitychange", ()=>{ if(document.visibilityState==="visible") Sound.wake(); });
window.addEventListener("focus", ()=>Sound.wake());
window.addEventListener("pageshow", (e)=>{
  // if the browser restored a frozen mid-game snapshot (back/forward cache),
  // reload so the splash — and the version-switch link — are always fresh
  // this will allow the user to switch versions easily
  if(e.persisted){ location.reload(); return; }
  Sound.wake();
});

/* Lock zoom. NOTE: recent iOS Safari intentionally limits a web page's ability to
   disable pinch-zoom (accessibility), so this may not fully hold on the newest iOS.
   It does block zoom on Android, other browsers, and older iOS. Single-finger
   scrolling and taps are never affected — only multi-finger / pinch is cancelled. */
function _blockPinch(e){
  if((e.touches && e.touches.length>1) || (typeof e.scale==="number" && e.scale!==1)){
    e.preventDefault();
  }
}
function _killGesture(e){ e.preventDefault(); }
for(const t of ["gesturestart","gesturechange","gestureend"]){
  document.addEventListener(t, _killGesture, {passive:false, capture:true});
  window.addEventListener(t, _killGesture, {passive:false, capture:true});
}
document.addEventListener("touchstart", _blockPinch, {passive:false, capture:true});
document.addEventListener("touchmove",  _blockPinch, {passive:false, capture:true});

/* best-effort portrait lock (works in installed/Android contexts; harmless no-op in iOS Safari, where the CSS rotate-gate handles it instead) */
try{ if(screen.orientation && screen.orientation.lock) screen.orientation.lock("portrait").catch(()=>{}); }catch(e){}

/* one-time "Add to Home Screen" hint — iOS Safari only, hidden once installed/dismissed */
function _isIOS(){
  const ua=navigator.userAgent||"";
  return /iPhone|iPad|iPod/.test(ua) || (/Macintosh/.test(ua) && "ontouchend" in document);
}
function _isIOSSafari(){
  const ua=navigator.userAgent||"";
  return _isIOS() && /Safari/.test(ua) && !/CriOS|FxiOS|EdgiOS|OPiOS|GSA/.test(ua);
}
function _isStandalone(){
  return window.navigator.standalone===true ||
    (window.matchMedia && window.matchMedia("(display-mode: standalone)").matches);
}
function _dismissA2HS(){
  const el=$("#a2hs"); if(el) el.classList.remove("on");
  Store.set("yorimichi_a2hs_seen", true);
}
function maybeShowA2HS(){
  if(Store.get("yorimichi_a2hs_seen", false)) return;   // show once, ever
  if(_isStandalone()) return;                            // already installed → full screen already
  if(!_isIOSSafari()) return;                            // Safari share→add flow only
  const el=$("#a2hs"); if(!el) return;
  el.classList.add("on");
  Store.set("yorimichi_a2hs_seen", true);                // mark as shown so it never repeats
  const x=$("#a2hsX"); if(x) x.addEventListener("click", ()=>{Sound.tick();_dismissA2HS();});
  el.addEventListener("click", e=>{ if(e.target!==x) _dismissA2HS(); });
  setTimeout(()=>{ if(el.classList.contains("on")) el.classList.remove("on"); }, 13000); // auto-hide
}

newSession();

// set initial pixel icons on the persistent float buttons
$$(".js-sound").forEach(b=>b.innerHTML=pxIcon(Sound.isEnabled()?"soundOn":"soundOff",18));
$$(".js-pass").forEach(b=>b.innerHTML=pxIcon("book",18));
{ const ri=$("#rotIcon"); if(ri) ri.innerHTML=pxIcon("phone",40); }
showSplash();
</script>
