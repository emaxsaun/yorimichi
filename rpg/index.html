<title>ヨリミチ — Yorimichi: A Konbini Visit</title>
<meta name="description" content="A quiet Japanese convenience-store visit you can take any time you miss it. Walk over, browse the shelves, tap your IC card, and eat something good." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&family=M+PLUS+Rounded+1c:wght@400;500;700;800&family=Roboto+Mono:wght@400;500;700&family=Press+Start+2P&family=DotGothic16&display=swap" rel="stylesheet">
<style>
/* ============================================================
   YORIMICHI — design tokens
   The UI stays quiet and fluorescent-clean; the PRODUCTS carry
   the color. Night warms and darkens, the street glows outside.
   ============================================================ */
:root{
  --brand:#0E9E6E;        /* leaf green */
  --brand-deep:#0A5C44;
  --brand-ink:#063b2c;
  --tag:#FFCB45;          /* price-pop yellow */
  --tag-ink:#5a4200;
  --sky:#5BB7E0;          /* cold-case blue */
  --hot:#E8622A;          /* heated-food orange */
  --ink:#1F2421;
  --ink-soft:#5b635c;
  --floor:#F4F3EC;        /* fluorescent cream */
  --panel:#FFFFFF;
  --line:#e4e3da;
  --shadow:0 1px 0 rgba(0,0,0,.04), 0 8px 24px -12px rgba(31,36,33,.28);
  --receipt:#FBFAF3;
  --night-bg:#13182b;
  --night-glow:#f2b25c;
  --r:18px;
  --maxw:1040px;
  --topH:62px;            /* store header height; aisle bar sticks right below */
  --fast:.16s;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:pan-x pan-y;}
html,body{margin:0;padding:0;touch-action:pan-x pan-y;height:100%;width:100%;}
body{
  font-family:"M PLUS Rounded 1c",system-ui,sans-serif;
  color:#eeeeee;
  background:#dfe6e4;
  -webkit-font-smoothing:antialiased;
  position:fixed;inset:0;overflow:hidden;overscroll-behavior:none;
  -webkit-user-select:none;user-select:none;-webkit-touch-callout:none;-webkit-tap-highlight-color:transparent;
}
#world,#stage,.whud,.joywrap,.fieldprompt,.actbtn{
  -webkit-user-select:none;user-select:none;-webkit-touch-callout:none;-webkit-tap-highlight-color:transparent;
}
/* re-enable selection inside populated app screens (receipts etc.) */
#app:not(:empty){-webkit-user-select:text;user-select:text;}
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 16px;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
h1,h2,h3{font-family:"Zen Maru Gothic",sans-serif;margin:0;line-height:1.15;letter-spacing:.01em;}
.jp{font-family:"Zen Maru Gothic",sans-serif;}
.mono{font-family:"Roboto Mono",monospace;font-variant-numeric:tabular-nums;}

/* time-of-day backdrop applied to <body> — kept light enough for dark text;
   the real night mood lives inside the storefront / journey / enjoy art panels */
body.tod-morning{background:linear-gradient(180deg,#fbe6c9,#cfe3df);}
body.tod-day{background:linear-gradient(180deg,#cfe9ef,#dfe6e4);}
body.tod-evening{background:linear-gradient(180deg,#f6dcc6,#dcdfec);}
body.tod-late{background:linear-gradient(180deg,#dbe3f0,#ccd4e2);}

/* ============================================================ APP SHELL */
#app{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;
  overscroll-behavior:contain;display:flex;flex-direction:column;}
.screen{flex:1;display:flex;flex-direction:column;animation:fade var(--fast) ease both;}
@keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}

/* floating controls */
.float{position:fixed;top:calc(12px + env(safe-area-inset-top, 0px));right:calc(12px + env(safe-area-inset-right, 0px));z-index:60;display:flex;gap:8px;}
.iconbtn{width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,.92);
  box-shadow:var(--shadow);display:grid;place-items:center;font-size:18px;transition:transform var(--fast);}
.iconbtn:active{transform:scale(.9);}

/* ============================================================ TITLE / STOREFRONT */
.title{display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;gap:30px;padding:40px 16px 64px;}
.storefront{width:100%;max-width:560px;margin:0 auto;display:block;filter:drop-shadow(0 30px 40px rgba(20,24,43,.25));}
.title h1{margin-top:4px;}
.title-tag{font-size:15px;color:var(--ink-soft);max-width:36ch;line-height:1.7;text-wrap:balance;margin:0 auto;}
.title-controls{display:flex;flex-direction:column;align-items:center;gap:18px;width:100%;}
.title-controls .eyebrow{margin-bottom:2px;}
.title .chooser{gap:10px;}
.brandline{display:flex;align-items:center;gap:10px;justify-content:center;}
.brandmark{font-family:"Zen Maru Gothic";font-weight:900;font-size:13px;letter-spacing:.28em;color:var(--brand);
  border:2px solid var(--brand);border-radius:999px;padding:5px 14px 4px;}
.cta{background:var(--brand);color:#fff;font-weight:800;font-size:18px;padding:16px 30px;border-radius:999px;
  box-shadow:0 10px 20px -8px var(--brand-deep);transition:transform var(--fast),box-shadow var(--fast);}
.cta:hover{transform:translateY(-2px);box-shadow:0 16px 26px -10px var(--brand-deep);}
.cta:active{transform:translateY(0) scale(.98);}
.cta.ghost{background:#fff;color:var(--brand-deep);box-shadow:var(--shadow);}
.cta.small{font-size:15px;padding:12px 22px;}
.cta-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
.chooser{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:4px;}
.chip{background:#fff;border:2px solid var(--line);border-radius:999px;padding:8px 14px;font-weight:700;font-size:13px;
  color:var(--ink-soft);transition:all var(--fast);}
.chip[aria-pressed="true"]{border-color:var(--brand);color:var(--brand-deep);background:#eafaf3;}
.fineprint{font-size:12px;color:var(--ink-soft);opacity:.8;max-width:34ch;line-height:1.6;text-wrap:balance;margin:0 auto;}

/* ============================================================ SPLASH */
.splash{min-height:100%;flex:1;display:flex;align-items:center;justify-content:center;text-align:center;
  padding:28px 20px;cursor:pointer;-webkit-user-select:none;user-select:none;}
.splash-inner{display:flex;flex-direction:column;align-items:center;gap:16px;max-width:520px;width:100%;animation:fade .5s ease both;}
.splash .storefront{max-width:380px;}
.splash-title{font-size:clamp(40px,12vw,64px);letter-spacing:.06em;}
.splash-sub{color:var(--ink-soft);font-size:15px;max-width:28ch;line-height:1.5;margin:0 auto;}
.splash-cta{margin-top:10px;font-weight:800;color:#fff;background:var(--brand);border-radius:999px;
  padding:15px 30px;font-size:16px;box-shadow:0 12px 24px -10px var(--brand-deep);animation:breathe 2s ease-in-out infinite;}
.splash-hint{font-size:11.5px;color:var(--ink-soft);opacity:.7;margin-top:2px;}
@keyframes breathe{0%,100%{transform:scale(1);}50%{transform:scale(1.045);}}
body.splash-mode .float{display:none;}
body.in-store .float{display:none;}   /* in the store the sound/passport live inside the top bar */
.topbar .topicon{flex:none;width:38px;height:38px;box-shadow:none;border:1.5px solid var(--line);}

/* passport opens as an overlay so closing it returns you to the exact screen underneath */
.passport-overlay{position:fixed;inset:0;z-index:50;overflow-y:auto;-webkit-overflow-scrolling:touch;
  background:linear-gradient(180deg,#eef3f1,#e2eae7);display:none;}
.passport-overlay.on{display:block;animation:fade .24s ease both;}
.iconbtn.is-off{opacity:.4;pointer-events:none;}

/* one-time "add to home screen" hint (iOS Safari only) */
.a2hs{position:fixed;left:50%;bottom:calc(18px + env(safe-area-inset-bottom,0px));transform:translateX(-50%);
  z-index:55;display:none;align-items:center;gap:10px;max-width:calc(100% - 24px);
  background:rgba(28,33,30,.95);color:#fff;border-radius:15px;padding:11px 12px 11px 15px;
  box-shadow:0 14px 34px -10px rgba(0,0,0,.55);font-size:13.5px;font-weight:600;line-height:1.35;
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);}
.a2hs.on{display:flex;animation:a2hsUp .42s cubic-bezier(.2,.8,.2,1) both;}
.a2hs .shareico{display:inline-block;vertical-align:-3px;margin:0 1px;}
.a2hs b{font-weight:800;}
.a2hs-x{flex:none;width:27px;height:27px;border-radius:50%;background:rgba(255,255,255,.16);
  color:#fff;font-size:17px;line-height:1;display:grid;place-items:center;}
@keyframes a2hsUp{from{opacity:0;transform:translate(-50%,14px);}to{opacity:1;transform:translate(-50%,0);}}

/* portrait-only on phones: show a rotate prompt in landscape (Safari tabs can't truly lock orientation) */
.rotate-gate{display:none;}
@media (orientation:landscape) and (max-height:520px) and (pointer:coarse){
  .rotate-gate{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;
    text-align:center;padding:24px;background:linear-gradient(165deg,#0E9E6E,#0A5C44);color:#fff;}
  .rotate-gate .ri{max-width:340px;display:flex;flex-direction:column;gap:10px;align-items:center;}
  .rotate-gate .ri .rot{font-size:52px;animation:rotateHint 2.4s ease-in-out infinite;}
  .rotate-gate .ri h2{font-size:22px;}
  .rotate-gate .ri p{font-size:14px;opacity:.92;line-height:1.5;margin:0;}
  .float,.a2hs{display:none !important;}
}
@keyframes rotateHint{0%,55%,100%{transform:rotate(0);}25%{transform:rotate(-90deg);}}

/* ============================================================ JOURNEY */
.journey{display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;gap:22px;padding:30px 16px;}
.scene{width:100%;max-width:560px;border-radius:24px;overflow:hidden;box-shadow:var(--shadow);}
.scene svg{display:block;width:100%;}
.eyebrow{font-size:12px;letter-spacing:.22em;font-weight:800;color:var(--brand);text-transform:uppercase;}
.journey h2{font-size:26px;}
.narr{color:var(--ink-soft);max-width:34ch;line-height:1.6;font-size:15px;}
.pathcards{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;max-width:520px;}
.pathcard{background:#fff;border-radius:20px;padding:18px 16px;box-shadow:var(--shadow);text-align:left;
  border:2px solid transparent;transition:transform var(--fast),border-color var(--fast);}
.pathcard:hover{transform:translateY(-3px);border-color:var(--brand);}
.pathcard .big{font-size:30px;}
.pathcard h3{font-size:17px;margin:8px 0 4px;}
.pathcard p{margin:0;font-size:13px;color:var(--ink-soft);line-height:1.45;}

/* vending machine mini-buy */
.vend{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:6px;}

/* ============================================================ STORE */
.topbar{position:sticky;top:0;z-index:40;background:rgba(255,255,255,.98);backdrop-filter:blur(8px);
  border-bottom:1px solid var(--line);}
.topbar .wrap{display:flex;align-items:center;gap:12px;height:var(--topH);}
.logo{font-family:"Zen Maru Gothic";font-weight:900;color:var(--brand);font-size:20px;display:flex;align-items:center;gap:7px;}
.logo small{font:800 9px/1 "M PLUS Rounded 1c";letter-spacing:.2em;color:var(--ink-soft);}
.topspace{flex:1;}
.balance{display:flex;align-items:center;gap:8px;background:#eafaf3;border:1.5px solid #bfe9d6;border-radius:999px;
  padding:6px 12px;}
.balance .ic{width:26px;height:18px;border-radius:4px;background:linear-gradient(120deg,#7bdcb5,#16a06e);
  box-shadow:inset 0 0 0 1.5px rgba(0,0,0,.06);}
.balance b{font:700 15px/1 "Roboto Mono";font-variant-numeric:tabular-nums;}
.basketbtn{position:relative;flex:none;white-space:nowrap;background:var(--brand);color:#fff;border-radius:999px;padding:9px 16px 9px 14px;font-weight:800;
  display:flex;align-items:center;gap:8px;box-shadow:0 8px 16px -8px var(--brand-deep);}
.basketbtn .count{flex:none;background:#fff;color:var(--brand-deep);border-radius:999px;min-width:22px;height:22px;
  display:grid;place-items:center;font-size:12px;padding:0 6px;}
.basketbtn .bk-ico{display:none;font-size:16px;}
.timepill{flex:none;white-space:nowrap;font-size:12px;font-weight:700;color:var(--ink-soft);background:#fff;border:1px solid var(--line);
  border-radius:999px;padding:6px 11px;display:flex;align-items:center;gap:6px;}
.timepill .tp-mini{display:none;}
.balance{flex:none;}
.topback{flex:none;display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:50%;
  background:#fff;border:1.5px solid var(--line);color:var(--ink-soft);font-size:20px;line-height:1;transition:transform var(--fast);}
.topback:active{transform:scale(.9);}

/* aisle tabs */
.aisles{position:sticky;top:calc(var(--topH) - 1px);z-index:30;background:var(--floor);border-bottom:1px solid var(--line);}
.aisles .wrap{display:flex;gap:6px;overflow-x:auto;padding:10px 16px;scrollbar-width:none;}
.aisles .wrap::-webkit-scrollbar{display:none;}
.aisle{white-space:nowrap;background:#fff;border:1.5px solid var(--line);border-radius:999px;padding:9px 15px;
  font-weight:700;font-size:13px;color:var(--ink-soft);transition:all var(--fast);display:flex;gap:7px;align-items:center;}
.aisle[aria-selected="true"]{background:var(--ink);color:#fff;border-color:var(--ink);}

.storebody{flex:1;padding:18px 0 120px;}
.sectionhead{display:flex;align-items:baseline;gap:10px;margin:6px 2px 14px;}
.sectionhead h2{font-size:21px;}
.sectionhead .sub{font-size:12px;color:var(--ink-soft);}
.shelf{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;}
.product{background:#fff;border-radius:16px;padding:12px;box-shadow:var(--shadow);text-align:left;position:relative;
  display:flex;flex-direction:column;gap:8px;transition:transform var(--fast);overflow:hidden;}
.product:hover{transform:translateY(-3px);}
.product:active{transform:scale(.98);}
.product .art{height:96px;display:grid;place-items:center;}
.product .art svg{height:92px;width:auto;filter:drop-shadow(0 6px 6px rgba(31,36,33,.12));}
.product .nm{font-weight:800;font-size:14px;line-height:1.2;}
.product .nm .ro{display:block;font-size:11px;color:var(--ink-soft);font-weight:600;}
.product .dsc{font-size:11.5px;color:var(--ink-soft);line-height:1.35;min-height:1px;}
.product .foot{display:flex;align-items:center;justify-content:space-between;margin-top:auto;}
.price{font-family:"Roboto Mono";font-weight:700;font-size:15px;}
.price small{font-size:10px;font-weight:500;color:var(--ink-soft);}
.add{background:var(--brand);color:#fff;border-radius:10px;width:34px;height:34px;font-size:20px;font-weight:700;
  display:grid;place-items:center;line-height:1;transition:transform var(--fast);}
.add:active{transform:scale(.82);}
.badge{position:absolute;top:10px;left:10px;font-size:9.5px;font-weight:800;letter-spacing:.04em;
  padding:4px 7px;border-radius:999px;color:#fff;}
.badge.hot{background:var(--hot);}
.badge.ltd{background:#c0392b;}
.badge.season{background:var(--brand);}
.badge.cold{background:var(--sky);}
.qtydot{position:absolute;top:10px;right:10px;background:var(--ink);color:#fff;border-radius:999px;min-width:22px;height:22px;
  display:grid;place-items:center;font-size:12px;font-weight:800;}

.recommend{background:linear-gradient(120deg,#eafaf3,#fff);border:1.5px dashed #bfe9d6;border-radius:18px;
  padding:14px 16px;display:flex;gap:14px;align-items:center;margin-bottom:16px;}
.recommend svg{height:62px;flex:none;}
.recommend .rtxt b{display:block;font-size:11px;letter-spacing:.14em;color:var(--brand);text-transform:uppercase;margin-bottom:2px;}
.recommend .rtxt p{margin:0;font-size:13px;color:var(--ink-soft);line-height:1.4;}

/* ============================================================ BASKET DRAWER */
.scrim{position:fixed;inset:0;background:rgba(20,24,43,.42);z-index:70;opacity:0;pointer-events:none;transition:opacity .2s;}
.scrim.on{opacity:1;pointer-events:auto;}
.drawer{position:fixed;top:0;right:0;height:100%;width:min(420px,92vw);background:var(--floor);z-index:80;
  transform:translateX(100%);transition:transform .26s cubic-bezier(.2,.8,.2,1);display:flex;flex-direction:column;
  box-shadow:-20px 0 50px -20px rgba(20,24,43,.5);}
.drawer.on{transform:none;}
.drawer header{padding:18px 18px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line);}
.drawer header h2{font-size:18px;}
.drawer .items{flex:1;overflow:auto;padding:10px 14px;display:flex;flex-direction:column;gap:8px;}
.bitem{background:#fff;border-radius:14px;padding:8px 10px;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow);}
.bitem svg{height:42px;width:42px;flex:none;}
.bitem .bn{flex:1;min-width:0;}
.bitem .bn b{font-size:13.5px;display:block;line-height:1.2;}
.bitem .bn span{font-size:11px;color:var(--ink-soft);}
.stepper{display:flex;align-items:center;gap:6px;}
.stepper button{width:26px;height:26px;border-radius:8px;background:#f0efe7;font-size:16px;font-weight:800;display:grid;place-items:center;}
.stepper b{min-width:18px;text-align:center;font-size:14px;}
.empty{padding:40px 20px;text-align:center;color:var(--ink-soft);}
.empty svg{height:90px;opacity:.7;margin-bottom:10px;}
.drawer footer{padding:14px 16px 18px;border-top:1px solid var(--line);background:var(--px-navy);}
.totrow{display:flex;justify-content:space-between;font-size:13px;color:var(--px-dim);margin-bottom:4px;}
.totrow.grand{font-size:20px;font-weight:800;color:var(--px-red);margin:8px 0 12px;}
.totrow.grand .mono{font-size:22px;}

/* ============================================================ REGISTER */
.register{display:flex;flex-direction:column;align-items:center;text-align:center;padding:20px 16px 40px;gap:18px;}
.counter{width:100%;max-width:560px;}
.clerk-bubble{background:#fff;border-radius:18px 18px 18px 4px;padding:12px 16px;box-shadow:var(--shadow);
  max-width:420px;margin:0 auto;font-weight:700;display:inline-flex;gap:10px;align-items:center;}
.clerk-bubble .face{font-size:24px;}
.scanlist{width:100%;max-width:420px;margin:0 auto;background:#fff;border-radius:16px;box-shadow:var(--shadow);
  padding:8px;text-align:left;max-height:240px;overflow:auto;}
.scanrow{display:flex;align-items:center;gap:10px;padding:7px 8px;border-bottom:1px dashed var(--line);
  opacity:.25;transform:translateX(8px);transition:all .2s;}
.scanrow.scanned{opacity:1;transform:none;}
.scanrow:last-child{border-bottom:none;}
.scanrow svg{height:34px;width:34px;}
.scanrow .sn{flex:1;font-size:13px;font-weight:700;}
.scanrow .sp{font-family:"Roboto Mono";font-size:13px;}
.askbox{background:#fff;border-radius:18px;box-shadow:var(--shadow);padding:18px;max-width:440px;margin:0 auto;width:100%;}
.askbox h3{font-size:17px;margin-bottom:4px;}
.askbox p{margin:0 0 14px;color:var(--px-dim);font-size:13px;}
.askrow{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}

/* payment methods */
.paygrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.paymethod{background:#fff;border:2px solid var(--line);border-radius:16px;padding:14px 12px;text-align:center;
  font-weight:800;font-size:14px;transition:all var(--fast);display:flex;flex-direction:column;gap:6px;align-items:center;}
.paymethod:hover{border-color:var(--brand);transform:translateY(-2px);}
.paymethod .pm-ic{font-size:26px;}
.paymethod small{font-weight:600;font-size:11px;color:var(--px-dim);}

/* IC tap moment — the signature interaction */
.tapstage{max-width:440px;margin:0 auto;width:100%;text-align:center;}
.reader{width:180px;height:180px;margin:14px auto;border-radius:24px;background:radial-gradient(circle at 50% 40%,#1a8a6a,#0a5c44);
  display:grid;place-items:center;position:relative;box-shadow:inset 0 0 0 6px rgba(255,255,255,.08),var(--shadow);
  overflow:hidden;}
.reader::after{content:"";position:absolute;inset:0;border-radius:24px;box-shadow:inset 0 0 60px rgba(0,0,0,.35);}
.reader .ripple{position:absolute;width:40px;height:40px;border-radius:50%;border:3px solid rgba(255,255,255,.5);
  opacity:0;}
.reader.active .ripple{animation:ring 1.4s ease-out infinite;}
.reader .ripple:nth-child(2){animation-delay:.45s;}
.reader .ripple:nth-child(3){animation-delay:.9s;}
@keyframes ring{0%{opacity:.7;transform:scale(.3);}100%{opacity:0;transform:scale(3.4);}}
.reader .touchpad{position:relative;z-index:2;color:#fff;font-weight:800;font-size:13px;text-align:center;line-height:1.5;}
.reader .touchpad .pico{font-size:32px;}
.iccard{width:150px;height:96px;margin:0 auto;border-radius:12px;background:linear-gradient(135deg,#16a06e,#0a5c44);
  box-shadow:var(--shadow);color:#fff;padding:10px 12px;text-align:left;position:relative;cursor:pointer;
  transition:transform .2s;}
.iccard:hover{transform:translateY(-3px) rotate(-1deg);}
.iccard .penguin{position:absolute;right:8px;bottom:6px;font-size:30px;}
.iccard b{font-family:"Zen Maru Gothic";font-size:13px;letter-spacing:.1em;}
.iccard .bal{font-family:"Roboto Mono";font-size:16px;font-weight:700;margin-top:18px;}
.tap-hint{font-size:13px;color:var(--panel);margin-top:6px;}
.lowbal{color:#c0392b;font-weight:700;font-size:13px;}

/* cash */
.cashtray{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:12px 0;}
.bill{border:none;border-radius:10px;padding:14px 16px;font-weight:800;font-family:"Roboto Mono";font-size:14px;
  box-shadow:var(--shadow);color:#3a3320;}
.bill.y1000{background:#cfe3da;}
.bill.y5000{background:#d7cae0;}
.bill.y10000{background:#e7d2b6;}
.bill.coin{background:#e9e4d2;border-radius:50%;width:54px;height:54px;padding:0;}
.cashstatus{font-family:"Roboto Mono";font-size:15px;font-weight:700;min-height:22px;}

/* ============================================================ RECEIPT */
.receiptwrap{padding:28px 0 60px;display:flex;flex-direction:column;align-items:center;gap:20px;}
.receipt{background:var(--receipt);width:330px;max-width:92vw;padding:22px 22px 30px;box-shadow:0 24px 50px -18px rgba(31,36,33,.4);
  font-family:"Roboto Mono";font-size:12.5px;color:#2a2a26;position:relative;
  -webkit-mask:radial-gradient(7px at 7px 50%,transparent 98%,#000) left/100% 16px repeat-y,
               radial-gradient(7px at calc(100% - 7px) 50%,transparent 98%,#000) right/100% 16px repeat-y;
  mask:radial-gradient(7px at 7px 50%,transparent 98%,#000) left/100% 16px repeat-y,
       radial-gradient(7px at calc(100% - 7px) 50%,transparent 98%,#000) right/100% 16px repeat-y;
  animation:print .6s ease both;transform-origin:top;}
@keyframes print{from{transform:scaleY(0);opacity:.4;}to{transform:scaleY(1);opacity:1;}}
.receipt .rhead{text-align:center;font-family:"Zen Maru Gothic";font-weight:900;font-size:18px;letter-spacing:.2em;color:var(--brand-deep);}
.receipt .rsub{text-align:center;font-size:10.5px;color:#6b6b62;margin-bottom:45px;}
.receipt .rule{border-top:1.5px dashed #b9b9ad;margin:8px 0;}
.receipt .rrow{display:flex;justify-content:space-between;gap:8px;padding:2px 0;}
.receipt .rrow .nm{flex:1;}
.receipt .rrow.tot{font-weight:700;font-size:14px;}
.receipt .rmeta{font-size:10.5px;color:#6b6b62;line-height:1.7;margin-top:8px;}
.receipt .stamp{position:absolute;right:14px;bottom:14px;border:2px solid #c0392b;color:#c0392b !important;border-radius:8px;
  padding:3px 8px;font-family:"Zen Maru Gothic";font-weight:900;transform:rotate(-9deg);opacity:.8;font-size:12px;border-color: #c0392b !important;box-shadow: 0 0 0 2px #f3f1e6, 0 0 0 5px #c0392b !important;}
.points{background:#fff;border-radius:14px;box-shadow:var(--shadow);padding:10px 16px;font-size:13px;font-weight:700;
  display:flex;gap:8px;align-items:center;}

/* ============================================================ ENJOY */
.enjoy{padding:0 0 50px;display:flex;flex-direction:column;align-items:center;}
.enjoyscene{width:100%;max-width:600px;}
.enjoyscene svg{display:block;width:100%;}
.enjoycard{background:#fff;border-radius:20px;box-shadow:var(--shadow);padding:18px;max-width:440px;margin:-30px 16px 0;
  width:calc(100% - 32px);text-align:center;position:relative;z-index:2;}
.enjoycard.multi-item{min-height:520px;display:flex;flex-direction:column;}
.enjoycard.multi-item .enjoynav{margin-top:auto;}
.enjoycard .bigart{height:120px;margin:2px auto 8px;display:grid;place-items:center;}
.enjoycard .bigart svg{height:120px;filter:drop-shadow(0 10px 10px rgba(31,36,33,.18));}
.enjoycard h2{font-size:20px;}
.enjoycard .ro{color:var(--ink-soft);font-size:13px;margin:2px 0 12px;}
.enjoycard .flavor{font-size:14.5px;line-height:1.6;color:var(--ink);font-style:italic;}
.enjoynav{display:flex;gap:8px;align-items:center;justify-content:center;width:100%;margin-top:16px;}
.dotnav{display:flex;gap:6px;}
.dotnav i{width:8px;height:8px;border-radius:50%;background:var(--line);display:block;}
.dotnav i.on{background:var(--brand);}
.enjoycount{min-width:48px;color:var(--ink-soft);font-size:13px;font-weight:800;font-variant-numeric:tabular-nums;}

/* ============================================================ PASSPORT */
.passport{padding:22px 16px 60px;}
.statgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:18px;}
.stat{background:#fff;border-radius:16px;box-shadow:var(--shadow);padding:14px;text-align:center;}
.stat b{display:block;font-family:"Roboto Mono";font-size:24px;font-weight:700;color:var(--brand-deep);}
.stat span{font-size:11.5px;color:var(--ink-soft);}
.passgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:10px;}
.stamp{background:#fff;border-radius:14px;box-shadow:var(--shadow);padding:10px 6px;text-align:center;position:relative;}
.stamp svg{height:50px;width:auto;}
.stamp.locked{filter:grayscale(1);opacity:.32;}
.stamp .sname{font-size:10.5px;font-weight:700;margin-top:4px;line-height:1.15;}
.stamp .cnt{position:absolute;top:6px;right:6px;background:var(--brand);color:#fff;border-radius:999px;font-size:10px;
  font-weight:800;min-width:18px;height:18px;display:grid;place-items:center;padding:0 4px;}
.achwrap{display:flex;flex-wrap:wrap;gap:8px;margin:14px 0 0;}
.ach{background:#fff;border-radius:999px;box-shadow:var(--shadow);padding:8px 14px;font-size:12.5px;font-weight:700;
  display:flex;gap:8px;align-items:center;}
.ach.locked{opacity:.4;}
.subhead{display:flex;align-items:center;gap:8px;margin:6px 2px 12px;}
.subhead h2{font-size:18px;}
.subhead .ln{flex:1;height:1px;background:var(--line);}

/* toast */
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);z-index:120;pointer-events:none;
  background:var(--ink);color:#fff;padding:11px 18px;border-radius:999px;font-weight:700;font-size:13.5px;
  box-shadow:var(--shadow);opacity:0;transition:all .26s;display:flex;gap:8px;align-items:center;max-width:90vw;}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0);}

/* tappable QR / credit device on the touch-pay screen */
.paydevice{margin:0 auto 2px;cursor:pointer;transition:transform .18s;box-shadow:var(--shadow);}
.paydevice:hover{transform:translateY(-3px);}
.paydevice:active{transform:scale(.97);}
.paydevice.phone{width:108px;background:#1f2421;border-radius:16px;padding:9px 9px 8px;color:#fff;}
.paydevice.phone .qr{width:100%;border-radius:6px;overflow:hidden;display:block;}
.paydevice.phone .qr svg{display:block;width:100%;}
.paydevice.phone span{display:block;font-size:10px;font-weight:800;letter-spacing:.12em;margin-top:6px;}
.paydevice.card{width:150px;height:96px;border-radius:12px;background:linear-gradient(135deg,#3a4a6b,#1f2940);color:#fff;padding:10px 12px;text-align:left;position:relative;}
.paydevice.card b{font-family:"Zen Maru Gothic";font-size:12px;letter-spacing:.08em;}
.paydevice.card .chip{position:absolute;top:36px;left:12px;width:26px;height:18px;border-radius:4px;background:linear-gradient(120deg,#f4d06b,#c9a13b);}
.paydevice.card .num{position:absolute;bottom:10px;left:12px;font-family:"Roboto Mono";font-size:13px;letter-spacing:.12em;}

/* centered modal sheet (time/season picker, IC charge) */
.modal{position:fixed;inset:0;z-index:90;display:none;align-items:center;justify-content:center;padding:20px;}
.modal.on{display:flex;}
.modalcard{background:var(--floor);border-radius:22px;box-shadow:0 30px 60px -20px rgba(20,24,43,.5);
  padding:22px;max-width:380px;width:100%;text-align:center;animation:pop .2s ease both;}
@keyframes pop{from{transform:scale(.94);opacity:0}to{transform:scale(1);opacity:1}}
.modalcard h3{font-family:"Zen Maru Gothic";font-size:18px;margin-bottom:4px;}
.modalcard .msub{font-size:12.5px;color:var(--ink-soft);margin-bottom:14px;}
.modalcard .eyebrow{margin:14px 0 8px;}
.modalrow{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}

.center-narrow{max-width:520px;margin:0 auto;width:100%;}
.backbtn{font-weight:700;color:var(--ink-soft);font-size:14px;display:inline-flex;gap:6px;align-items:center;padding:8px 4px;}
.linkbtn{font-weight:700;color:var(--ink-soft);font-size:13px;text-decoration:underline;text-underline-offset:3px;
  padding:8px 12px;border-radius:999px;transition:all var(--fast);}
.linkbtn:hover{color:var(--ink);}
.linkbtn.danger{color:#fff;background:#d9534f;text-decoration:none;box-shadow:0 8px 16px -8px #d9534f;}
.bagnote{display:flex;align-items:center;gap:8px;justify-content:center;margin-top:10px;color:var(--ink-soft);font-size:12.5px;font-weight:600;}
.bagnote .bagicon{width:38px;height:38px;flex:none;}
.bagnote .bagicon svg{width:100%;height:100%;display:block;}

@media (max-width:560px){
  .shelf{grid-template-columns:repeat(auto-fill,minmax(46%,1fr));}
  .title h1{font-size:30px;}
  .title{gap:24px;padding:28px 0 48px;}
  .pathcards{grid-template-columns:1fr;}
  .float{top:calc(8px + env(safe-area-inset-top, 0px));right:calc(8px + env(safe-area-inset-right, 0px));gap:6px;}
  .iconbtn{width:38px;height:38px;font-size:16px;}
  .topbar .wrap{gap:4px;}
  :root{--topH:58px;}
  .topbar .timepill{padding:7px 6px;}
  .topbar .timepill .tp-full{display:none;}
  .topbar .timepill .tp-mini{display:inline;font-size:15px;letter-spacing:0;}
  .topbar .topicon{width:34px;height:34px;font-size:15px;}
  .logo{font-size:16px;min-width:0;flex-shrink:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
  .logo small{display:none;}
  .topback{width:32px;height:32px;font-size:18px;}
  .balance{padding:5px 8px;gap:6px;}
  .balance .ic{display:none;}
  .balance b{font-size:13px;}
  .basketbtn{padding:7px 9px;font-size:14px;}
  .basketbtn .bk-label{display:none;}
  .basketbtn .bk-ico{display:inline;}
}
/* narrower phones (iPhone 12–16 standard = 390px, etc.): claw back room so the
   full ヨリミチ still fits. Ellipsis remains as a safety net below this. */
@media (max-width:413px){
  .topbar .wrap{gap:3px;}
  .logo{font-size:14.5px;}
  .topbar .timepill{padding:7px 5px;}
  .topbar .timepill .tp-mini{font-size:14px;}
  .topbar .topicon{width:33px;height:33px;}
  .balance{padding:5px 7px;}
  .basketbtn{padding:7px 8px;}
}
@media (prefers-reduced-motion:reduce){
  *{animation-duration:.001s !important;transition-duration:.001s !important;}
  .reader.active .ripple{animation:none;opacity:0;}
}
/* ============================================================
   PIXEL-UI OVERRIDE LAYER — full retro conversion of all HTML surfaces.
   Dark JRPG dialog boxes, chunky pixel font, hard borders, square corners,
   no soft shadows. Loaded last so it wins the cascade.
   ============================================================ */
:root{
  --px-navy:#1b2440;      /* dialog background */
  --px-navy2:#141b30;     /* darker panel */
  --px-edge:#0c1020;      /* outer hard border */
  --px-light:#e8ecf5;     /* light text */
  --px-dim:#98a4c4;       /* dim text */
  --px-green:#2fbf87;
  --px-green-d:#0d6a4a;
  --px-yellow:#f5c542;
  --px-red:#f07070;
  --px-line:#3a4670;      /* inner divider */
}
:focus-visible{outline:3px solid var(--px-green);outline-offset:2px;}

/* pixel fonts everywhere */
body, button, input, .mono, .jp,
h1,h2,h3,.logo,.brandmark,.price,.receipt,.iccard b,.iccard .bal{
  font-family:"DotGothic16","Press Start 2P",monospace !important;
  -webkit-font-smoothing:none; font-smooth:never;
}
.px-latin, .brandmark, .cta, .splash-cta, .paymethod b{
  font-family:"Press Start 2P","DotGothic16",monospace !important;
  letter-spacing:0;
}
body{ image-rendering:pixelated; }

/* nuke rounded corners and soft shadows globally */
.screen *, .whud *, #dialogBox *, #modal *, #drawer *, #passportOverlay *,
.a2hs, .toast, .iconbtn, .cta, .chip, .balance, .basketbtn, .timepill, .topback,
.product, .add, .aisle, .bitem, .stepper button, .recommend, .clerk-bubble,
.scanlist, .askbox, .paymethod, .reader, .iccard, .bill, .receipt, .dbox-panel,
.dbox-row, .dbox-close, .radd, .jchoose-card, .jchoose-time, .fieldprompt, .actbtn{
  border-radius:0 !important;
  box-shadow:none !important;
}

/* hard 3px pixel border helper look for panels */
.px-panel{
  background:var(--px-navy);
  border:3px solid var(--px-edge);
  box-shadow:inset 0 0 0 2px var(--px-navy), inset 0 0 0 3px var(--px-line) !important;
  color:var(--px-light);
}

/* ---- store HUD ---- */
.whud{
  background:var(--px-navy) !important;
  border-bottom:3px solid var(--px-edge) !important;
  backdrop-filter:none !important;-webkit-backdrop-filter:none !important;
}
.whud .logo{ color:var(--px-green) !important; font-size:12px !important; }
.whud .timepill,.whud .balance,.whud .basketbtn,.whud .iconbtn,.whud .topback{
  background:var(--px-navy2) !important; border:2px solid var(--px-line) !important; color:var(--px-light) !important;
}
.whud .balance b, .whud .balance{ color:var(--px-yellow) !important; }
.whud .basketbtn{ background:var(--px-green-d) !important; color:#fff !important; border-color:#093a29 !important;}
.whud .basketbtn .count{ background:var(--px-yellow) !important; color:#3a2b00 !important; border:2px solid #3a2b00 !important;}
.whud .iconbtn{ width:34px !important;height:34px !important; }

/* ---- generic buttons / chips / cta ---- */
.cta,.splash-cta{
  background:var(--px-green) !important; color:#062a1e !important;
  border:3px solid var(--px-edge) !important; box-shadow:inset -3px -3px 0 0 var(--px-green-d) !important;
  font-size:13px !important; padding:16px 22px !important;
}
.cta:active,.splash-cta:active{ box-shadow:inset 3px 3px 0 0 var(--px-green-d) !important; }
.chip{ background:var(--px-navy2) !important; color:var(--px-light) !important; border:2px solid var(--px-line) !important; }
.chip.on,.chip[aria-pressed="true"]{ background:var(--px-green) !important; color:#062a1e !important; }
.brandmark{ color:var(--px-green) !important; border:3px solid var(--px-green) !important; font-size:9px !important; }
.iconbtn{ background:var(--px-navy2) !important; border:2px solid var(--px-line) !important; color:var(--px-light) !important; }

/* ---- JRPG dialog box (shelf browse / clerk / vending) ---- */
.dbox-panel{
  background:var(--px-navy) !important;
  border:3px solid var(--px-edge) !important;
  box-shadow:0 0 0 2px var(--px-line) inset, 0 -4px 0 0 var(--px-edge) !important;
  color:var(--px-light);
}
.dbox-head{ border-bottom:2px solid var(--px-line) !important; }
.dbox-head h3,.dbox-head .jp{ color:var(--px-light) !important; font-size:12px !important; }
.dbox-head .sub{ color:var(--px-dim) !important; }
.dbox-close{ background:var(--px-navy2) !important; border:2px solid var(--px-line) !important; color:var(--px-light) !important; }
.dbox-row{ border-bottom:2px solid var(--px-line) !important; }
.dbox-row .rtxt b{ color:var(--px-light) !important; font-size:11px !important; }
.dbox-row .rtag{ color:var(--px-dim) !important; }
.dbox-row .rprice{ color:var(--px-yellow) !important; }
.dbox-row .radd{ background:var(--px-green) !important; color:#062a1e !important; border:2px solid var(--px-edge) !important; box-shadow:inset -2px -2px 0 0 var(--px-green-d) !important;}
.dbox-row .rsub{ background:var(--px-navy2) !important; color:var(--px-red) !important; border:2px solid var(--px-line) !important; box-shadow:none !important; }
.rqty-ctrl{ display:flex; align-items:center; gap:4px; flex:none; }
.rqty{ color:var(--px-yellow) !important; font-size:11px; font-weight:700; min-width:14px; text-align:center; }
.rsub,.radd{ width:34px; height:34px; font-size:18px; display:flex; align-items:center; justify-content:center; cursor:pointer; flex:none; }
.rsub.hidden,.rqty.hidden{ display:none; }
.dbox-empty,.dbox-foot{ color:var(--px-dim) !important; }
.dbox-row .rart{ image-rendering:pixelated; }

/* ---- scrim/modal/drawer ---- */
.scrim{ background:rgba(8,10,20,.66) !important; }
.modal,.drawer{
  background:var(--px-navy) !important; color:var(--px-light) !important;
  border:3px solid var(--px-edge) !important; box-shadow:0 0 0 2px var(--px-line) inset !important;
}
.modal h2,.modal h3,.drawer h2,.drawer h3{ color:var(--px-light) !important; font-size:12px !important; }

/* ---- product cards / aisles / basket items / register flow ---- */
.product,.bitem,.scanlist,.askbox,.recommend,.clerk-bubble,.paymethod,.iccard{
  background:var(--px-navy2) !important; color:var(--px-light) !important;
  border:2px solid var(--px-line) !important;
}
.product b,.bitem b,.askbox b,.paymethod b{ color:var(--px-light) !important; }
.price,.receipt,.iccard .bal{ color:var(--px-yellow) !important; }
.add,.radd,.stepper button{ background:var(--px-green) !important; color:#062a1e !important; border:2px solid var(--px-edge) !important; }
.aisle{ background:var(--px-navy2) !important; color:var(--px-light) !important; border:2px solid var(--px-line) !important; }
.aisle.on{ background:var(--px-green) !important; color:#062a1e !important; }

"use strict";
/* ============================================================================
   YORIMICHI — A Konbini Visit.  Single-file, no dependencies, no assets.
   Art = inline SVG.  Sound = Web Audio (synthesized).  Saves = localStorage
   (gracefully degrades to memory where storage is blocked, e.g. previews).
   Drop this file in a repo, enable GitHub Pages, done.
   ============================================================================ */

/* ----------------------------------------------------------- safe storage */
const Store = (() => {
  let mem = {};
  let ok = true;
  try { const k="__yori"; localStorage.setItem(k,"1"); localStorage.removeItem(k); }
  catch(e){ ok=false; }
  return {
    get(k,d){ try{ const v = ok?localStorage.getItem(k):mem[k]; return v==null?d:JSON.parse(v);}catch(e){return d;} },
    set(k,v){ try{ const s=JSON.stringify(v); if(ok)localStorage.setItem(k,s); else mem[k]=s; }catch(e){ mem[k]=JSON.stringify(v);} }
  };
})();

/* ----------------------------------------------------------- audio engine */
const Sound = (() => {
  let ctx=null, master=null, ambGain=null, ambNodes=[], enabled=true, started=false, ambKind=null, pendingKind=null;
  function ensure(){
    if(ctx) return;
    try{
      ctx = new (window.AudioContext||window.webkitAudioContext)();
      master = ctx.createGain(); master.gain.value=0.9; master.connect(ctx.destination);

        }

  }
  function now(){ return ctx.currentTime; }
  function tone(freq, t0, dur, type, vol, glideTo){
    if(!ctx||!enabled) return;
    try{
    const o=ctx.createOscillator(), g=ctx.createGain();
    o.type=type||"sine"; o.frequency.setValueAtTime(freq, t0);
    if(glideTo) o.frequency.exponentialRampToValueAtTime(glideTo, t0+dur);
    g.gain.setValueAtTime(0.0001,t0);
    g.gain.exponentialRampToValueAtTime(vol||0.2, t0+0.012);
    g.gain.exponentialRampToValueAtTime(0.0001, t0+dur);
    o.connect(g); g.connect(master); o.start(t0); o.stop(t0+dur+0.05);
    }catch(e){}
  }
  function noise(t0,dur,vol,filterFreq){
    if(!ctx||!enabled)return;

    const n=Math.floor(ctx.sampleRate*dur), buf=ctx.createBuffer(1,n,ctx.sampleRate), d=buf.getChannelData(0);

    const f=ctx.createBiquadFilter(); f.type="bandpass"; f.frequency.value=filterFreq||1200; f.Q.value=0.8;
    const g=ctx.createGain(); g.gain.setValueAtTime(vol||0.15,t0); g.gain.exponentialRampToValueAtTime(0.001,t0+dur);

    }catch(e){}
  }
  const API={
    resume(){ ensure(); if(!ctx) return;
      const after=()=>{ if(pendingKind && enabled){ const k=pendingKind; pendingKind=null; API.startAmbient(k); } };
      if(ctx.state==="running"){ after(); return; }
      try{ const p=ctx.resume(); if(p&&p.then) p.then(after).catch(()=>{}); else after(); }catch(e){}
    },
    /* recover audio after an iOS interruption (screen lock / backgrounding) */
    wake(){ ensure(); if(!ctx||!enabled) return;
      const revive=()=>{ if(ambKind){ const k=ambKind; API.stopAmbient(); API.startAmbient(k); } };
      if(ctx.state==="running"){ revive(); return; }
      try{ const p=ctx.resume(); if(p&&p.then) p.then(revive).catch(()=>{}); else revive(); }catch(e){}
    },

    chime(){ ensure(); if(!ctx)return; const t=now(); tone(987.77,t,0.5,"sine",0.28); tone(1318.5,t,0.5,"sine",0.18,1318.5);

    depart(){ ensure(); if(!ctx)return; let t=now(); const seq=[659.25,783.99,987.77,783.99,1174.7,987.77,783.99];

    stamp(){ ensure(); if(!ctx)return; const t=now(); noise(t,0.06,0.25,400); tone(330,t,0.1,"square",0.1); },
    startAmbient(kind){
      kind = kind || "store";
      ensure(); if(!ctx||!enabled) return;
      if(ctx.state!=="running"){ pendingKind=kind; return; }
      if(ambNodes.length){ if(ambKind===kind) return; API.stopAmbient(); }
      ambKind=kind;
      ambGain=ctx.createGain(); ambGain.gain.value=0.0; ambGain.connect(master);
      let ambTimer;
      if(kind==="title"){
        /* outside, before you go in — a warm low pad + a slow, wistful music box.

        ambGain.gain.linearRampToValueAtTime(0.085, now()+2.2);
        const pad1=ctx.createOscillator(); pad1.type="triangle"; pad1.frequency.value=146.83; /* D3 */

        const mel=[587.33,659.25,880,659.25,587.33,493.88,587.33,440];
        let i=0;
        const loop=()=>{ if(!ambNodes.length) return; const t=now();

          i++; ambTimer=setTimeout(loop,2300); };
        ambTimer=setTimeout(loop,700);
        ambNodes=[pad1,pad2,lfo,()=>clearTimeout(ambTimer)];
      } else {
        /* inside — fluorescent fridge hum + bright store muzak */
        ambGain.gain.linearRampToValueAtTime(0.06, now()+1.5);
        const hum=ctx.createOscillator(); hum.type="sawtooth"; hum.frequency.value=60;

        const hg=ctx.createGain(); hg.gain.value=0.5; hum.connect(hf); hf.connect(hg); hg.connect(ambGain); hum.start();

        const loop=()=>{ if(!ambNodes.length) return; const t=now(); tone(notes[i%notes.length],t,1.6,"sine",0.05);

      if(ambGain){ try{ambGain.gain.linearRampToValueAtTime(0.0001,now()+0.4);}catch(e){} }
      ambNodes.forEach(n=>{ try{ typeof n==="function"?n():n.stop(now()+0.5);}catch(e){} });
      ambNodes=[]; ambKind=null;

const START_BALANCE = 5000;
const DEFAULT = {
  visits:0, totalSpent:0, icPays:0, lowestBalAfterPay:null,
  balance:START_BALANCE, // single spending balance, shared by every payment method
  points:0,              // loyalty points earned over time
  noBag:0,               // times you brought your own / declined a bag
  journal:{},            // id -> count ever purchased
  achievements:{},       // id -> true
};
let G = Object.assign({}, DEFAULT, Store.get("yorimichi_save", {}));
G.journal = G.journal||{}; G.achievements=G.achievements||{};
// migrate older saves (separate IC card + wallet) into one balance
if(G.balance==null){
  const old = (Number(G.icBalance)||0) + (Number(G.cash)||0);
  G.balance = old>0 ? old : START_BALANCE;
}
if(G.balance<0) G.balance=0;
if(G.points==null) G.points=0;
if(G.noBag==null) G.noBag=0;
delete G.icBalance; delete G.cash;

let session = {};     // per-visit data, reset each entry
let bgmAllowed = true; // whether ambient BGM should play on the current screen
let bgmKind = "title"; // which ambient bed the current screen wants
function newSession(){
  session = {
    balance: G.balance,   // single spending balance (carried over)
    cart: {},         // id -> qty
    season: autoSeason(),
    time: "day",
    arrived:false, paid:false,
    limited: LIMITEDS[Math.floor(Math.random()*LIMITEDS.length)],
    recommend: null,
    bagged:false, pointcard:false, warmed:false,
  };
}
function autoSeason(){ const m=new Date().getMonth(); return m<=1||m===11?"winter":m<=4?"spring":m<=7?"summer":"autumn"; }
function save(){ Store.set("yorimichi_save", {visits:G.visits,totalSpent:G.totalSpent,icPays:G.icPays,
  lowestBalAfterPay:G.lowestBalAfterPay,balance:G.balance,points:G.points,noBag:G.noBag,
  journal:G.journal,achievements:G.achievements}); }
function resetProgress(){
  G = {visits:0,totalSpent:0,icPays:0,lowestBalAfterPay:null,balance:START_BALANCE,points:0,noBag:0,journal:{},achievements:{}};
  save();
  newSession();
}
function recharge(amount){
  session.balance += amount; G.balance = session.balance; save();
  const bt=$("#balTop"); if(bt) bt.textContent=yen(session.balance);
}

/* item lookup including limited */
function itemById(id){ return CATALOG.find(i=>i.id===id) || (session.limited&&session.limited.id===id?session.limited:null) ||
  LIMITEDS.find(i=>i.id===id) || null; }

function availableItems(){
  const out = CATALOG.filter(i=>{
    const okS = !i.seasons || i.seasons.includes(session.season);
    const okT = !i.times || i.times.includes(session.time);
    return okS && okT;
  });
  if(session.limited) out.push(session.limited);
  return out;
}

  b.classList.add("tod-"+session.time);
  if(typeof W!=="undefined") W.tod = session.time;

function toast(msg, iconHTML){
  const t=$("#toast");
  if(iconHTML){
    t.innerHTML = `<span class="toast-ic"></span>`;
    t.querySelector(".toast-ic").innerHTML = iconHTML;   // trusted pxIcon svg
    t.append(document.createTextNode(" "+msg));          // message stays text (safe)
  } else {
    t.textContent = msg;
  }
  t.classList.add("on");
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove("on"),2200);
}
function cartCount(){ return Object.values(session.cart).reduce((a,b)=>a+b,0); }
function cartSubtotal(){ return Object.entries(session.cart).reduce((a,[id,q])=>{const it=itemById(id);return a+(it?it.price*q:0);},0); }

function seasonParticles(season){
  // pixel squares drifting down — same motion as before, blocky shapes
  let s="", i;
  const drift=(inner,x,dx,dur,beg)=>`<g>${inner}<animateTransform attributeName="transform" type="translate" from="${x} -16" to="${x+dx} 372" dur="${dur}s" begin="${beg}s" repeatCount="indefinite"/></g>`;
  if(season==="winter"){
    for(i=0;i<18;i++){ const x=10+(i*31)%545; const sz=3+(i%3)*2;
      const dur=(7+(i%5)*1.6).toFixed(1); const beg=(-(i*0.7)).toFixed(1); const dx=(i%2?14:-10);
      s+=drift(`<rect x="0" y="0" width="${sz}" height="${sz}" fill="#ffffff" opacity="0.92"/>`,x,dx,dur,beg); }
    return s;
  }
  if(season==="spring"){
    for(i=0;i<12;i++){ const x=15+(i*47)%540; const dur=(8+(i%4)*1.4).toFixed(1); const beg=(-(i*0.9)).toFixed(1); const dx=(i%2?42:-34);
      s+=drift(`<rect x="0" y="0" width="6" height="6" fill="#F7C2D6" opacity="0.95"/><rect x="4" y="-4" width="5" height="5" fill="#FBD0E0" opacity="0.9"/>`,x,dx,dur,beg); }
    return s;
  }
  if(season==="autumn"){
    const cols=["#E8622A","#FFCB45","#E94F6B","#C9762B"];
    for(i=0;i<13;i++){ const x=12+(i*43)%545; const c=cols[i%cols.length]; const dur=(6.5+(i%4)*1.3).toFixed(1); const beg=(-(i*0.8)).toFixed(1); const dx=(i%2?50:-40);
      s+=drift(`<rect x="0" y="0" width="8" height="8" fill="${c}" opacity="0.95"/><rect x="3" y="-3" width="3" height="3" fill="#7a5230" opacity="0.9"/>`,x,dx,dur,beg); }
    return s;
  }
  /* summer: a few green pixel leaves drifting slowly */
  const cols=["#7bbf5a","#5ea845","#9ad17a"];
  for(i=0;i<6;i++){ const x=50+i*90; const c=cols[i%cols.length]; const dur=(10+i*1.4).toFixed(1); const beg=(-(i*1.6)).toFixed(1); const dx=(i%2?28:-24);
    s+=drift(`<rect x="0" y="0" width="9" height="5" fill="${c}" opacity="0.9"/><rect x="3" y="-2" width="3" height="2" fill="${c}" opacity="0.9"/>`,x,dx,dur,beg); }
  return s;
}
function seasonTint(season){
  const c = season==="spring"?"rgba(255,178,206,0.12)"
          : season==="summer"?"rgba(120,205,255,0.13)"
          : season==="autumn"?"rgba(232,120,46,0.13)"
          : "rgba(186,214,238,0.18)"; /* winter */
  return `<rect width="560" height="360" fill="${c}"/>`;
}

    [[16,72],[42,60],[62,86],[76,68],[94,84],[104,66]].forEach(([x,y])=>{
      s+=R(x,y,14,14,"#FBD0E0")+R(x+2,y+2,5,5,"#ffffff",0.8)+R(x+5,y+5,4,4,"#E98AAE");
    });
    return `<g>${s}</g>`;
  }

    // bushes: stacked rects
    s+=R(44,242,64,14,"#5ea845")+R(56,232,40,10,"#5ea845")+R(52,238,24,8,"#7bbf5a",0.85);
    s+=R(96,246,48,10,"#5ea845");
    s+=R(474,244,58,12,"#5ea845")+R(486,236,34,8,"#7bbf5a",0.85);

  if(season==="autumn"){
    // square fallen leaves resting on the pavement

    let s="";
    [[70,300],[150,320],[250,310],[360,322],[450,304],[510,318],[110,332],[300,332]].forEach(([x,y],k)=>{
      const c=cols[k%cols.length];
      s+=R(x,y,10,10,c,0.92)+R(x+3,y-4,4,4,"#7a5230",0.9);
    });
    return `<g>${s}</g>`;
  }
  /* winter: snow strips on the sign, window sills, and ground; small piles */
  let s=R(62,66,436,7,"#ffffff",0.95);           // snow on the sign top
  s+=R(75,124,196,6,"#ffffff",0.95);              // left window sill
  s+=R(289,124,136,6,"#ffffff",0.95);             // right window sill

  s+=R(480,246,50,10,"#ffffff",0.95)+R(494,240,22,6,"#ffffff",0.95); // pile right

}
function storefrontSVG(time, season){
  const night = time==="late" || time==="evening";
  const sky = time==="morning"?"#FBE6C9":time==="day"?"#CDEAF1":time==="evening"?"#E8A06A":"#10162C";
  const ground = night?"#1b2138":"#c9c8bd";
  const glow = "#FFF6D8";
  const signOn = "#0E9E6E";
  const OUT = "#20241c";
  const R=(x,y,w,h,c,o)=>`<rect x="${x}" y="${y}" width="${w}" height="${h}" fill="${c}"${o?` opacity="${o}"`:""}/>`;
  let s="";
  s+=R(0,0,560,360,sky);
  // blocky sun / crescent moon + square stars
  if(night){
    s+=R(455,30,30,10,"#F6F0D8")+R(445,40,50,30,"#F6F0D8")+R(455,70,30,10,"#F6F0D8");
    s+=R(445,40,18,30,sky); // crescent bite
    [[120,50],[200,35],[330,60],[90,90],[260,28],[400,96],[40,40]].forEach(([x,y])=>{ s+=R(x,y,5,5,"#fff",0.9); });
  } else {
    s+=R(80,30,30,10,"#FFE9A8")+R(70,40,50,30,"#FFE9A8")+R(80,70,30,10,"#FFE9A8");
  }
  s+=seasonTint(season);
  // ground
  s+=R(0,250,560,110,ground);
  // building: hard outline + facade
  s+=R(56,66,448,198,OUT);
  s+=R(62,72,436,186, night?"#e9e7dc":"#f4f3ec");
  // sign band: green stripes + white middle
  s+=R(62,72,436,10,signOn);
  s+=R(62,82,436,28,"#fff");
  s+=R(62,110,436,10,signOn);
  s+=`<text x="280" y="105" text-anchor="middle" font-family="DotGothic16, monospace" font-weight="700" font-size="27" fill="${signOn}" letter-spacing="8">ヨリミチ</text>`;
  // windows (outline frame + glass)
  const win=(x,y,w,h)=>R(x-5,y-5,w+10,h+10,OUT)+R(x,y,w,h, night?glow:"#dff0ee");
  s+=win(80,130,186,114);
  s+=win(294,130,126,114);
  // blocky shelf rows + product squares in the left window
  const shelfA = night?0.55:0.4;
  s+=R(90,152,166,7,signOn,shelfA)+R(90,176,166,7,signOn,shelfA)+R(90,200,166,7,signOn,shelfA);
  const prods=[[96,160,"#0E9E6E"],[114,160,"#E8622A"],[132,160,"#5BB7E0"],[168,160,"#FFCB45"],
               [96,184,"#FFCB45"],[114,184,"#0E9E6E"],[150,184,"#E94F6B"],[186,184,"#5BB7E0"]];
  prods.forEach(([x,y,c])=>{ s+=R(x,y,13,13,c,night?0.75:0.6); });
  // a couple of blocky rows in the right window too
  s+=R(304,160,106,7,signOn,shelfA)+R(304,192,106,7,signOn,shelfA);
  [[312,168,"#E8622A"],[336,168,"#5BB7E0"],[366,168,"#E94F6B"],[312,200,"#FFCB45"],[352,200,"#0E9E6E"]].forEach(([x,y,c])=>{ s+=R(x,y,12,12,c,night?0.75:0.6); });
  // automatic door: outline + two panes + center bar
  s+=R(427,143,64,106,OUT);
  s+=R(432,148,54,96, night?glow:"#eafaf3");
  s+=R(456,148,6,96,OUT);
  // vending machine beside the door — blocky, like the world tile
  s+=R(496,166,52,88,OUT);
  s+=R(501,171,42,78,"#5BB7E0");
  s+=R(507,178,30,24,"#fff");
  [[509,214,"#E8334F"],[523,214,"#5BB7E0"],[509,228,"#FFCB45"],[523,228,"#7bbf5a"]].forEach(([x,y,c])=>{ s+=R(x,y,8,8,c); });
  s+=R(507,240,30,5,OUT);
  // night: warm window wash + stepped pixel light spill onto the pavement
  if(night){
    s+=R(80,130,340,114,"#FFF6D8",0.12);
    s+=R(80,250,340,16,"#FFF1C9",0.30);
    s+=R(62,266,376,16,"#FFF1C9",0.20);
    s+=R(44,282,412,16,"#FFF1C9",0.12);
  }
  return `
  <svg viewBox="0 0 560 360" xmlns="http://www.w3.org/2000/svg" class="storefront" role="img" aria-label="Yorimichi convenience store front" style="image-rendering:pixelated">
    ${s}
    ${seasonAccents(season, night)}
    ${seasonParticles(season)}
  </svg>`;
}

function shade(hex, amt){
  const n = parseInt(hex.slice(1),16);
  let r=(n>>16)+amt, g=((n>>8)&255)+amt, b=(n&255)+amt;
  r=Math.max(0,Math.min(255,r)); g=Math.max(0,Math.min(255,g)); b=Math.max(0,Math.min(255,b));
  return "#"+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
}

const TOD_TINT = { morning:[1.02,0.96,0.86], day:[1,1,1], evening:[1.06,0.86,0.75], late:[0.62,0.68,0.86] };
function _mul(col,t){
  if(col.startsWith('rgba')) return col;
  const n=parseInt(col.slice(1),16); let r=(n>>16)&255,g=(n>>8)&255,b=n&255;
  r=Math.min(255,Math.round(r*t[0])); g=Math.min(255,Math.round(g*t[1])); b=Math.min(255,Math.round(b*t[2]));
  return `rgb(${r},${g},${b})`;
}
const _artCache = new Map();
function bakeArt(grid, key, tod, palOverride){
  const ck=key+"|"+tod+(palOverride?"|"+key:"");
  if(_artCache.has(ck)) return _artCache.get(ck);
  const h=grid.length,w=grid[0].length;
  const cv=document.createElement("canvas"); cv.width=w; cv.height=h;
  const c=cv.getContext("2d"); c.imageSmoothingEnabled=false;
  const t=TOD_TINT[tod]||TOD_TINT.day;
  const pal=palOverride?Object.assign({},ART_PAL,palOverride):ART_PAL;
  for(let y=0;y<h;y++){const row=grid[y];for(let x=0;x<w;x++){
    const chr=row[x]; if(chr===' '||chr===undefined) continue;
    const col=pal[chr]; if(!col) continue; c.fillStyle=_mul(col,t); c.fillRect(x,y,1,1);
  }}
  _artCache.set(ck,cv); return cv;
}
function blit(ctx,grid,key,tod,ox,oy,palOverride){
  const cv=bakeArt(grid,key,tod,palOverride);
  ctx.drawImage(cv, ox, oy-(cv.height-TILE));
}

/* ---------------------------------------------------------- engine state */
const DIRV = {up:[0,-1], down:[0,1], left:[-1,0], right:[1,0]};
const MOVE_MS = 150;
const W = {
  map:null, cam:{x:0,y:0}, active:false, raf:null, heldDir:null, facing:null, tod:"day", path:null,
  player:{tx:0,ty:0,fx:0,fy:0,dir:"down",moving:false,moveT:0,fromX:0,fromY:0,toX:0,toY:0,frame:0},
};
let lastFrameTime = 0;
const isTouch = window.matchMedia
  ? window.matchMedia("(pointer: coarse)").matches           // primary input is a finger?
  : (('ontouchstart' in window) || navigator.maxTouchPoints>0); // old-browser fallback

function tileChar(map,x,y){
  if(y<0||y>=map.rows.length) return "#";
  const row = map.rows[y];
  if(x<0||x>=row.length) return "#";
  return row[x];
}
function tileDef(map,x,y){
  return (map.legend[tileChar(map,x,y)]) || {solid:true};
}
function isWalkable(x,y){ return !tileDef(W.map,x,y).solid; }
function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }

function fieldInputAllowed(){
  if(!W.active || !W.map) return false;
  if(app.children.length>0) return false;
  if($("#modal").classList.contains("on")) return false;
  if($("#drawer").classList.contains("on")) return false;
  if($("#passportOverlay").classList.contains("on")) return false;
  if(dialogBox.classList.contains("on")) return false;
  return true;
}

function resizeStage(){
  if(!W.map) return;
  const inStore = document.body.classList.contains("rpg-in-store");
  const huH = inStore ? (whud.offsetHeight || 54) : 0;
  const availW = window.innerWidth;
  const availH = Math.max(80, window.innerHeight - huH);
  const mapWpx = W.map.rows[0].length*TILE, mapHpx = W.map.rows.length*TILE;
  const portraitish = availW <= availH * 1.15;   // roughly taller-than-wide
  const MAX_SCALE = 6;
  let scale;
  if(portraitish){
    // phones: fill the height using the design window, then size the canvas so it
    // matches the SCREEN exactly — nothing gets cropped, so the store walls are
    // actually visible when you walk up to them.
    scale = Math.min(availH/(W.map.viewH*TILE), MAX_SCALE);
    stage.height = Math.min(W.map.viewH*TILE, mapHpx);
    stage.width  = Math.min(Math.round(availW/scale), mapWpx);
  } else {
    // desktop / wide: show the whole design window, letterboxed, capped zoom
    stage.width  = Math.min(W.map.viewW*TILE, mapWpx);
    stage.height = Math.min(W.map.viewH*TILE, mapHpx);
    scale = Math.min(availW/stage.width, availH/stage.height, MAX_SCALE);
  }
  if(!isFinite(scale) || scale<=0) scale = 1;
  const cssW = stage.width*scale, cssH = stage.height*scale;
  stage.style.width = cssW+"px";
  stage.style.height = cssH+"px";
  stage.style.left = "50%";
  stage.style.transform = "translateX(-50%)";
  stage.style.top = (huH + (availH-cssH)/2)+"px";
  sctx.imageSmoothingEnabled = false;
}
window.addEventListener("resize", ()=>{ if(W.map) resizeStage(); });
window.addEventListener("orientationchange", ()=>{ if(W.map) setTimeout(resizeStage,60); });

function enterScene(map, spawnOverride){
  app.innerHTML = "";
  W.map = map;
  const sp = spawnOverride || map.spawn;
  W.player.tx=sp.x; W.player.ty=sp.y; W.player.fx=sp.x; W.player.fy=sp.y;
  W.player.dir=sp.dir; W.player.moving=false; W.player.frame=0;
  W.heldDir=null; W.facing=null; W.path=null;
  hideFieldPrompt(); actBtn.classList.add("hidden");
  document.body.classList.add("rpg-active");
  document.body.classList.toggle("rpg-in-store", map.id==="store");
  document.body.classList.toggle("in-store", map.id==="store");
  W.active = true;
  resizeStage();
  lastFrameTime = performance.now();
  cancelAnimationFrame(W.raf);
  W.raf = requestAnimationFrame(loop);
}
function resumeFieldEngine(){

  W.active = true;
  resizeStage();
  lastFrameTime = performance.now();
  cancelAnimationFrame(W.raf);
  W.raf = requestAnimationFrame(loop);
}

function checkAutoTile(){
  const def = tileDef(W.map, W.player.tx, W.player.ty);
  if(def.auto) def.auto();
}
function updateMovement(dt){
  const p = W.player;
  if(p.moving){
    p.moveT += dt;
    const t = Math.min(1, p.moveT/MOVE_MS);
    p.fx = p.fromX + (p.toX-p.fromX)*t;
    p.fy = p.fromY + (p.toY-p.fromY)*t;
    if(t>=1){
      p.moving=false; p.tx=p.toX; p.ty=p.toY; p.fx=p.tx; p.fy=p.ty;
      p.frame = p.frame===0?1:0;
      checkAutoTile();
    }
    return;
  }
  // manual joystick/keyboard input cancels any queued tap-path and takes over
  if(fieldInputAllowed() && W.heldDir){
    W.path=null;
    p.dir = W.heldDir;
    const [dx,dy] = DIRV[p.dir];
    const nx=p.tx+dx, ny=p.ty+dy;
    if(isWalkable(nx,ny)){
      p.moving=true; p.moveT=0;
      p.fromX=p.tx; p.fromY=p.ty; p.toX=nx; p.toY=ny;
    }
    return;
  }
  // follow a tapped path, one tile at a time
  if(fieldInputAllowed() && W.path && W.path.length){
    const next = W.path.shift();
    const dx=next.x-p.tx, dy=next.y-p.ty;
    if(dx>0)p.dir="right"; else if(dx<0)p.dir="left"; else if(dy>0)p.dir="down"; else if(dy<0)p.dir="up";
    if(isWalkable(next.x,next.y)){
      p.moving=true; p.moveT=0;
      p.fromX=p.tx; p.fromY=p.ty; p.toX=next.x; p.toY=next.y;
    } else { W.path=null; }
    if(W.path && !W.path.length){
      const ft=W.path._faceTarget;
      if(ft){ if(ft.x>next.x)p.dir="right"; else if(ft.x<next.x)p.dir="left"; else if(ft.y>next.y)p.dir="down"; else if(ft.y<next.y)p.dir="up"; }
      W.path=null;
    }
  }
}
function updateFacing(){
  const p=W.player;
  const [dx,dy]=DIRV[p.dir];
  const fx=p.tx+dx, fy=p.ty+dy;
  const def=tileDef(W.map,fx,fy);
  if(def.interact && !p.moving && fieldInputAllowed()){
    W.facing = {x:fx,y:fy,def};
    const verb = def.label||"interact";
    showFieldPrompt(isTouch ? `Ⓐ  ${verb}` : `Ⓑ / Space  ·  ${verb}`);
    actBtn.classList.remove("hidden");
  } else {
    W.facing = null;
    hideFieldPrompt();
    actBtn.classList.add("hidden");
  }
}
function updateCamera(){
  const p=W.player, map=W.map;
  const pxCenter=(p.fx+0.5)*TILE, pyCenter=(p.fy+0.5)*TILE;
  // clamp against what the canvas ACTUALLY shows (it's sized to the screen on phones)
  const viewWpx=stage.width, viewHpx=stage.height;
  const mapWpx=map.rows[0].length*TILE, mapHpx=map.rows.length*TILE;
  W.cam.x = clamp(pxCenter-viewWpx/2, 0, Math.max(0,mapWpx-viewWpx));
  W.cam.y = clamp(pyCenter-viewHpx/2, 0, Math.max(0,mapHpx-viewHpx));
}
function drawFrame(){
  const map=W.map;
  sctx.clearRect(0,0,stage.width,stage.height);
  const camX=W.cam.x, camY=W.cam.y;
  const cols=map.rows[0].length, rowsN=map.rows.length;
  const startCol=Math.max(0,Math.floor(camX/TILE));
  const endCol=Math.min(cols, Math.ceil((camX+stage.width)/TILE));
  // margin: tall props hang up to ~6px above their tile; extend range so nothing pops in/out
  const startRow=Math.max(0,Math.floor(camY/TILE));
  const endRow=Math.min(rowsN, Math.ceil((camY+stage.height)/TILE)+1);
  const isTall = ch => "RKVGTc".includes(ch); // register, clerk, vending, sign, train-door, counter (draw upward)
  // pass 1: ground/flat tiles only (so a tall prop is never overpainted by a later flat tile)
  for(let ty=startRow; ty<endRow; ty++){
    for(let tx=startCol; tx<endCol; tx++){
      const ch=tileChar(map,tx,ty);
      if(isTall(ch)) continue;
      const def=map.legend[ch]||map.legend["."];
      const ox=Math.round(tx*TILE-camX), oy=Math.round(ty*TILE-camY);
      if(def&&def.draw) def.draw(sctx,ox,oy,tx,ty);
    }
  }
  // pass 2: tall props, top-to-bottom, drawing their floor underlay first
  for(let ty=startRow; ty<endRow; ty++){
    for(let tx=startCol; tx<endCol; tx++){
      const ch=tileChar(map,tx,ty);
      if(!isTall(ch)) continue;
      const def=map.legend[ch]||map.legend["."];
      const ox=Math.round(tx*TILE-camX), oy=Math.round(ty*TILE-camY);
      if(def&&def.draw) def.draw(sctx,ox,oy,tx,ty);
    }
  }
  const ppx=Math.round(W.player.fx*TILE-camX);
  const ppy=Math.round(W.player.fy*TILE-camY);
  drawPlayer(sctx, ppx, ppy-4, W.player.dir, W.player.frame);
}
function loop(now){
  if(!W.active) return;
  const dt = Math.min(50, now-(lastFrameTime||now));
  lastFrameTime = now;
  updateMovement(dt);
  updateCamera();
  updateFacing();
  drawFrame();
  W.raf = requestAnimationFrame(loop);
}

  const closeBtn = $("#dboxClose"); if(closeBtn) closeBtn.addEventListener("click",closeDialog);

    if(e.target===dialogBox){ closeDialog(); return; }
    const add=e.target.closest("[data-add]");
    const sub=e.target.closest("[data-sub]");
    if(!add && !sub) return;
    if(add){ addToCart(add.dataset.add); updateDboxQty(add.dataset.add); }
    if(sub){
      const id=sub.dataset.sub;
      if((session.cart[id]||0)>0){ session.cart[id]--; if(!session.cart[id]) delete session.cart[id]; syncStoreCounts(); Sound.tick(); }

    }
    const foot=dialogBox.querySelector(".dbox-foot");
    if(foot) foot.textContent = cartCount()?`You have ${cartCount()} in your basket.`:"Tap ＋ to add something.";
  };

/* ---------------------------------------------------------- pixel train ride */
function runTrainRide(done){
  document.body.classList.remove("rpg-active","rpg-in-store","in-store"); // rpg-active off = joystick hidden during the ride
  hideFieldPrompt(); actBtn.classList.add("hidden");
  whud.innerHTML="";
  try{ Sound.depart && Sound.depart(); }catch(e){}
  const tod = W.tod||"day";
  // scenery palette per time of day (far background seen through windows)
  const SKY = { morning:"#f6d9b0", day:"#bfe3ef", evening:"#f0b48a", late:"#1a2340" };
  const GROUND = { morning:"#8fae7e", day:"#8fbf87", evening:"#7a8a6a", late:"#20304a" };
  const BUILDING = { morning:"#c9a98a", day:"#b7c0c4", evening:"#a07a6a", late:"#2a3a5a" };
  const sky=SKY[tod], ground=GROUND[tod], bld=BUILDING[tod];
  // set canvas to a portrait car view (tall, to match phones and minimize crop)
  const VW=11, VH=19;
  stage.width=VW*TILE; stage.height=VH*TILE;
  resizeStageFixed(VW,VH);
  const start=performance.now(); const DUR=4200;
  let scenery=0;
  function frame(now){
    const t=now-start;
    scenery=(scenery+2.4);
    const c=sctx; c.imageSmoothingEnabled=false;
    const w=stage.width,h=stage.height;
    // ---- car interior background
    c.fillStyle="#e6e9ea"; c.fillRect(0,0,w,h);
    // floor
    c.fillStyle="#c4cace"; c.fillRect(0,h-40,w,40);
    c.fillStyle="#aab2b6"; c.fillRect(0,h-40,w,3);
    // ceiling
    c.fillStyle="#d2d7d9"; c.fillRect(0,0,w,26);
    c.fillStyle="#b7c0c4"; c.fillRect(0,26,w,2);
    // ---- window band with scrolling scenery
    const wy=34, wh=64;
    c.fillStyle=sky; c.fillRect(0,wy,w,wh);
    c.fillStyle=ground; c.fillRect(0,wy+wh-16,w,16);
    // parallax buildings
    for(let i=0;i<14;i++){
      const bx=((i*70 - scenery) % (w+70));
      const x = bx<0?bx+w+70:bx;
      const bh=20+((i*37)%34);
      c.fillStyle=bld; c.fillRect(x, wy+wh-16-bh, 40, bh);
      c.fillStyle=tod==="late"?"#f2c85a":"rgba(255,255,255,.5)";
      for(let wyy=0; wyy<bh-6; wyy+=8){ c.fillRect(x+5, wy+wh-16-bh+4+wyy, 4,4); c.fillRect(x+14, wy+wh-16-bh+4+wyy, 4,4); c.fillRect(x+23, wy+wh-16-bh+4+wyy, 4,4); }
    }
    if(tod==="late"){ c.fillStyle="#fff"; for(let s=0;s<20;s++){ const sx=(s*53)%w, sy=wy+((s*29)%28); c.fillRect(sx,sy,1,1); } }
    // window frame mullions
    c.fillStyle="#96a0a4";
    c.fillRect(0,wy-4,w,4); c.fillRect(0,wy+wh,w,5);
    for(let mx=0; mx<=w; mx+=w/4){ c.fillRect(mx-3,wy-4,6,wh+9); }
    // ---- seats (blue bench) below window
    c.fillStyle="#3f6fb0"; c.fillRect(0,wy+wh+5,w,26);
    c.fillStyle="#345c94"; c.fillRect(0,wy+wh+5,w,4);
    c.fillStyle="#2b4c7a"; c.fillRect(0,wy+wh+5+26,w,4);
    // grab handles
    c.fillStyle="#b7a06a";
    for(let hx=20; hx<w; hx+=44){ c.fillRect(hx,28,2,12); c.strokeStyle="#b7a06a"; c.lineWidth=2; c.beginPath(); c.arc(hx+1,44,5,0,Math.PI*2); c.stroke(); }
    // ---- player standing in the car, gentle bob, scaled up to match the big car
    const bob = Math.sin(t/120)>0?0:1;
    const PS = 3.6; // player scale in the ride scene
    c.save();
    c.imageSmoothingEnabled=false;
    c.translate(w/2, h-40);
    c.scale(PS,PS);
    drawPlayer(c, -8, -16 - bob, "down", bob);
    c.restore();
    // ---- vignette + caption
    c.fillStyle="rgba(10,14,20,"+(t<400?(1-t/400)*0.9:(t>DUR-500?(t-(DUR-500))/500*0.9:0))+")";
    c.fillRect(0,0,w,h);
    if(t<DUR){ requestAnimationFrame(frame); }
    else { done(); }
  }
  requestAnimationFrame(frame);
}
function resizeStageFixed(vw,vh){
  const availW=window.innerWidth, availH=window.innerHeight;
  const fitW=availW/(vw*TILE), fitH=availH/(vh*TILE);
  const portraitish = availW <= availH * 1.15;
  let scale = portraitish ? Math.max(fitW,fitH) : Math.min(fitW,fitH);
  scale = Math.min(scale, 6);
  if(!isFinite(scale)||scale<=0) scale=1;
  const cssW=vw*TILE*scale, cssH=vh*TILE*scale;
  stage.style.width=cssW+"px";
  stage.style.height=cssH+"px";
  stage.style.left="50%"; stage.style.transform="translateX(-50%)";
  stage.style.top=((availH-cssH)/2)+"px";
}

/* ---------------------------------------------------------- virtual joystick + action button */
const JOY_RADIUS=52, JOY_DEAD=16, JOY_START=18;
let joyPointerId=null, joyOrigin={x:0,y:0}, joyEngaged=false;
function joyDirFromDelta(dx,dy){
  const dist=Math.hypot(dx,dy);
  if(dist<JOY_DEAD) return null;
  return Math.abs(dx)>Math.abs(dy) ? (dx>0?"right":"left") : (dy>0?"down":"up");
}
function moveJoy(e){
  const dx=e.clientX-joyOrigin.x, dy=e.clientY-joyOrigin.y;
  const dist=Math.hypot(dx,dy);
  // require an intentional drag past JOY_START before the stick "engages" — kills the
  // phantom first-direction from a finger that lands off-center
  if(!joyEngaged){
    if(dist < JOY_START){ W.heldDir=null; joyKnob.style.transform="translate(0px,0px)"; return; }
    joyEngaged=true;
  }
  const clamped=Math.min(dist,JOY_RADIUS);
  const ang=Math.atan2(dy,dx);
  joyKnob.style.transform = `translate(${Math.cos(ang)*clamped}px,${Math.sin(ang)*clamped}px)`;
  W.heldDir = joyDirFromDelta(dx,dy);
}
function endJoy(e){
  if(e.pointerId!==joyPointerId) return;
  joyPointerId=null; joyEngaged=false; W.heldDir=null;
  joyKnob.style.transform="translate(0px,0px)";
}
joyBase.addEventListener("pointerdown", e=>{
  if(!fieldInputAllowed()) return;
  e.preventDefault();
  joyPointerId=e.pointerId;
  // anchor the stick's origin to WHERE the finger actually landed, not the base center,
  // so a fat-fingered / off-center press starts perfectly neutral
  joyOrigin={x:e.clientX, y:e.clientY};
  joyEngaged=false;
  W.heldDir=null;
  joyKnob.style.transform="translate(0px,0px)";
  try{ joyBase.setPointerCapture(e.pointerId); }catch(err){}
});
joyBase.addEventListener("pointermove", e=>{ if(e.pointerId===joyPointerId){ e.preventDefault(); moveJoy(e); } });
joyBase.addEventListener("pointerup", endJoy);
joyBase.addEventListener("pointercancel", endJoy);
actBtn.addEventListener("pointerdown", e=>{
  e.preventDefault();
  if(!fieldInputAllowed()) return;
  if(W.facing && W.facing.def.interact) W.facing.def.interact();
});

/* ---- tap-to-move: BFS a path to the tapped tile (or interact if tapping an interactable) */
function bfsPath(sx,sy,gx,gy){
  const map=W.map; if(!map) return null;
  const key=(x,y)=>x+","+y;
  const q=[{x:sx,y:sy}]; const prev={}; prev[key(sx,sy)]=null;
  const W_=map.rows[0].length, H_=map.rows.length;
  let found=false;
  while(q.length){
    const cur=q.shift();
    if(cur.x===gx && cur.y===gy){ found=true; break; }
    for(const [dx,dy] of [[0,-1],[0,1],[-1,0],[1,0]]){
      const nx=cur.x+dx, ny=cur.y+dy;
      if(nx<0||ny<0||nx>=W_||ny>=H_) continue;
      const k=key(nx,ny);
      if(k in prev) continue;
      if(!isWalkable(nx,ny)) continue;
      prev[k]={x:cur.x,y:cur.y}; q.push({x:nx,y:ny});
    }
    if(q.length>2000) break; // safety
  }
  if(!found) return null;
  const path=[]; let c={x:gx,y:gy};
  while(c){ path.push({x:c.x,y:c.y}); c=prev[key(c.x,c.y)]; }
  path.reverse(); path.shift(); // drop the starting tile
  return path;
}
function stageToTile(clientX, clientY){
  const r=stage.getBoundingClientRect();
  const sx=(clientX-r.left)/r.width * stage.width;
  const sy=(clientY-r.top)/r.height * stage.height;
  const tx=Math.floor((sx + W.cam.x)/TILE);
  const ty=Math.floor((sy + W.cam.y)/TILE);
  return {tx,ty};
}
function onStageTap(clientX, clientY){
  if(!fieldInputAllowed()) return;
  const {tx,ty}=stageToTile(clientX,clientY);
  if(tx<0||ty<0||ty>=W.map.rows.length||tx>=W.map.rows[0].length) return;
  const def=tileDef(W.map,tx,ty);
  const p=W.player;
  // tapping an interactable you're adjacent to → face + interact
  const adj = Math.abs(tx-p.tx)+Math.abs(ty-p.ty)===1;
  if(def.interact){
    if(adj){
      if(tx>p.tx)p.dir="right"; else if(tx<p.tx)p.dir="left"; else if(ty>p.ty)p.dir="down"; else p.dir="up";
      def.interact(); return;
    }
    // otherwise walk to the nearest walkable tile next to it, then it'll be facing-interactable
    const spots=[[tx,ty-1],[tx,ty+1],[tx-1,ty],[tx+1,ty]].filter(([x,y])=>isWalkable(x,y));
    let best=null,bestLen=1e9;
    for(const [x,y] of spots){ const pa=bfsPath(p.tx,p.ty,x,y); if(pa&&pa.length<bestLen){best=pa;bestLen=pa.length;} }
    if(best){ W.path=best; W.path._faceTarget={x:tx,y:ty}; }
    return;
  }
  if(!isWalkable(tx,ty)) return;
  const path=bfsPath(p.tx,p.ty,tx,ty);
  if(path && path.length){ W.path=path; Sound.tick(); }
}
/* taps that land near the on-screen controls are meant for the controls, not the world —
   a finger that misses the joystick circle by a few px shouldn't send the character walking */
function tapNearControls(cx, cy){
  if(joyPointerId !== null) return true;           // a joystick drag is in progress (multitouch)
  const M = 36;                                    // forgiveness margin around each control
  for(const el of [joyBase, actBtn]){
    if(!el || el.classList.contains("hidden")) continue;
    const r = el.getBoundingClientRect();
    if(!r.width) continue;
    if(cx >= r.left-M && cx <= r.right+M && cy >= r.top-M && cy <= r.bottom+M) return true;
  }
  return false;
}
stage.addEventListener("pointerdown", e=>{
  e.preventDefault();
  if(tapNearControls(e.clientX, e.clientY)) return;
  onStageTap(e.clientX, e.clientY);
});

const KEYMAP = {ArrowUp:"up",ArrowDown:"down",ArrowLeft:"left",ArrowRight:"right",w:"up",s:"down",a:"left",d:"right",W:"up",S:"down",A:"left",D:"right"};
const INTERACT_KEYS = {" ":1,"Enter":1,"b":1,"B":1,"e":1,"E":1};
let keyHeld=null;
document.addEventListener("keydown", e=>{
  if(KEYMAP[e.key]){ if(fieldInputAllowed()){ keyHeld=KEYMAP[e.key]; W.heldDir=keyHeld; } }
  else if(INTERACT_KEYS[e.key] && fieldInputAllowed()){
    e.preventDefault();
    if(W.facing && W.facing.def.interact) W.facing.def.interact();
  }
});
document.addEventListener("keyup", e=>{

});

/* ---- desktop keyboard conveniences ---- */
document.addEventListener("keydown", e=>{
  const k=e.key;
  // ESC (or X): close the topmost open panel, else step back a screen
  if(k==="Escape"||k==="x"||k==="X"){
    if(dialogBox.classList.contains("on")){ Sound.tick(); closeDialog(); e.preventDefault(); return; }
    const modal=$("#modal");
    if(modal && modal.classList.contains("on")){ Sound.tick(); closeModal(); e.preventDefault(); return; }
    const drawer=$("#drawer");
    if(drawer && drawer.classList.contains("on")){ Sound.tick(); closeDrawer(); e.preventDefault(); return; }
    const pov=$("#passportOverlay");
    if(pov && pov.classList.contains("on")){ Sound.tick(); closePassportOverlay(); e.preventDefault(); return; }
    const back=$("#regBack")||$("#back");
    if(back){ back.click(); e.preventDefault(); }
    return;
  }
  // number keys press the nth ＋ button while a shelf / vending dialog is open
  if(dialogBox.classList.contains("on") && /^[1-9]$/.test(k)){
    const btns=dialogBox.querySelectorAll("[data-add],[data-vend]");
    const b=btns[+k-1]; if(b){ b.click(); e.preventDefault(); }
    return;
  }
  // i: toggle the basket while in the store
  if(k==="i"||k==="I"){
    const drawer=$("#drawer");
    if(drawer && drawer.classList.contains("on")){ Sound.tick(); closeDrawer(); e.preventDefault(); return; }
    if(W.active && W.map && W.map.id==="store"){ Sound.tick(); openDrawer(); e.preventDefault(); }
    return;
  }
  // p: toggle the passport
  if(k==="p"||k==="P"){
    const pov=$("#passportOverlay");
    if(pov && pov.classList.contains("on")){ Sound.tick(); closePassportOverlay(); }
    else { Sound.resume(); Sound.tick(); showPassport(); }
    e.preventDefault(); return;
  }
  // m: mute / unmute (via the button so all icons stay in sync)
  if(k==="m"||k==="M"){
    const sb=$$(".js-sound")[0]; if(sb){ sb.click(); e.preventDefault(); }
    return;
  }
});

function openModal(html){
  const m=$("#modal"), sc=$("#scrim");
  m.innerHTML=`<div class="modalcard">${html}</div>`;
  m.classList.add("on"); m.setAttribute("aria-hidden","false");
  sc.classList.add("on");
  sc.addEventListener("click", closeModal, {once:true});
  m.onclick=(e)=>{ if(e.target===m) closeModal(); };
  return m;
}
function closeModal(){ const m=$("#modal"); m.classList.remove("on"); m.setAttribute("aria-hidden","true"); m.innerHTML=""; $("#scrim").classList.remove("on"); }

function goRegister(){
  inStoreView = false;
    bgmAllowed = true; bgmKind = "store";
  Sound.startAmbient("store");
  closeDrawer();
  const entries=Object.entries(session.cart).filter(([,q])=>q>0);
  // expand to individual scan rows
  const rows=[];
  entries.forEach(([id,q])=>{const it=itemById(id);for(let i=0;i<q;i++)rows.push(it);});
  render(`
  <div class="register wrap">
    <button class="backbtn" id="regBack">‹ Back to the shop</button>
    <div class="clerk-bubble"><span class="face">${pxIcon("person",24)}</span><span class="jp">いらっしゃいませ。お会計でよろしいですか？</span></div>
    <div class="scanlist" id="scanlist">
      ${rows.map((it,i)=>`<div class="scanrow" data-i="${i}">${it.art()}<span class="sn">${it.ro}</span><span class="sp">${yen(it.price)}</span></div>`).join("")}
    </div>
    <div id="regStep"></div>
  </div>`);
  $("#regBack").addEventListener("click",()=>{ Sound.tick(); backToStore(); });

  };

}

function payIC(){
  const total=grandTotal();
  const low = session.balance < total;
  $("#regStep").innerHTML=`
    <div class="tapstage">
      ${low?`<p class="lowbal">残高不足 — Not enough balance (${yen(session.balance)}). Recharge, or pay another way.</p>`:""}
      <div class="reader" id="reader">
        <span class="ripple"></span><span class="ripple"></span><span class="ripple"></span>
        <div class="touchpad"><div class="pico">${pxIcon("penguin",28)}</div>${low?"RECHARGE NEEDED":"TOUCH HERE"}<br>${yen(total)}</div>
      </div>
      <div class="iccard" id="theCard">
        <b>ヨリミチ IC</b>
        <div class="bal" id="cardBal">${yen(session.balance)}</div>
        <span class="penguin">${pxIcon("penguin",22)}</span>
      </div>
      <p class="tap-hint">${low?"Tap ＋ to recharge ¥1000, then touch the card to the reader.":"Tap your card on the reader to pay."}</p>
      <div class="askrow" style="margin-top:10px">
        <button class="cta ghost small" id="chargeBtn">＋ Recharge ¥1000</button>
        <button class="cta ghost small" id="backPay">‹ Other payment</button>
      </div>
    </div>`;
  const reader=$("#reader");
  if(!low) reader.classList.add("active");
  $("#backPay").addEventListener("click",()=>{Sound.tick();choosePayment();});
  $("#chargeBtn").addEventListener("click",()=>{
    recharge(1000); Sound.coin();
    $("#cardBal").textContent=yen(session.balance);
    if(session.balance>=grandTotal()){ $(".lowbal")&&$(".lowbal").remove(); reader.classList.add("active");
      reader.querySelector(".touchpad").innerHTML=`<div class="pico">${pxIcon("penguin",28)}</div>TOUCH HERE<br>${yen(grandTotal())}`;
      $(".tap-hint").textContent="Recharged. Now tap your card to pay.";}
  });
  const tap=()=>{
    if(session.balance<grandTotal()){toast("Recharge first");Sound.error();return;}
    Sound.piLong();
    const total=grandTotal(); const before=session.balance; const target=before-total;
    G.icPays++;
    let cur=before; const balEl=$("#cardBal"); const step=Math.max(1,Math.round(total/16));
    const cd=setInterval(()=>{cur-=step; if(cur<=target){cur=target;clearInterval(cd);}
      balEl.textContent=yen(cur);},28);
    reader.classList.remove("active");
    reader.querySelector(".touchpad").innerHTML=`<div class="pico">${pxIcon("check",28)}</div>ありがとう<br>${yen(total)}`;
    setTimeout(()=>finishPay("IC card (タッチ決済)", total, 0),900);
  };
  reader.addEventListener("click",tap);
  $("#theCard").addEventListener("click",tap);
}

function payCash(){

      <div class="cashstatus" id="cstat">In tray: ${yen(0)}</div>

        <button class="bill y10000" data-add="10000">¥10000</button>

  const update=()=>{

    if(tendered>=total){pn.disabled=false;pn.style.opacity="1";
      $("#changeHint").textContent="Change due: "+yen(tendered-total);}
    else{pn.disabled=true;pn.style.opacity=".5";$("#changeHint").textContent="";}
